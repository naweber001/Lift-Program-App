// --- Set Program for Week Modal ---

function SetProgramModal({ dispatch, programs, currentWeek, workouts }) {
  const [selProg, setSelProg] = useState(null);
  const [assigns, setAssigns] = useState({});
  const [applied, setApplied] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [confirmApply, setConfirmApply] = useState(false);
  const wds = weekDates(currentWeek);

  // Check if this week has any existing workout data
  const weekHasData = wds.some(date => {
    const dk = localDateStr(date);
    const w = workouts[dk];
    return w && (w.exercises?.length > 0 || w.isRest);
  });

  const [slots, setSlots] = useState([]); // 7 slots, each is a program day index or null

  const selectProg = (p) => {
    setSelProg(p);
    // Fill slots: program days in order, then nulls for remaining weekdays
    const s = Array(7).fill(null);
    p.days.forEach((_, i) => { if (i < 7) s[i] = i; });
    setSlots(s);
    setConfirmApply(false);
  };

  // Convert slots back to assigns format for dispatch
  const slotsToAssigns = () => {
    const a = {};
    slots.forEach((progIdx, weekIdx) => {
      if (progIdx !== null) a[progIdx] = weekIdx;
    });
    return a;
  };

  const doClear = () => {
    dispatch({ type:"CLEAR_SCHEDULE", payload:currentWeek });
    weekDates(currentWeek).forEach(date => {
      const dk = localDateStr(date);
      dispatch({ type:"CLEAR_DAY", payload:dk });
    });
    dispatch({ type:"CLOSE_MODAL" });
  };

  const doApply = () => {
    if (!selProg) return;
    const assigns = slotsToAssigns();
    // Clear existing week data first
    wds.forEach(date => {
      const dk = localDateStr(date);
      dispatch({ type:"CLEAR_DAY", payload:dk });
    });
    dispatch({ type:"SET_SCHEDULE", payload:{ weekKey:currentWeek, programId:selProg.id, assignments:assigns }});
    selProg.days.forEach((d, i) => {
      if (assigns[i] === undefined) return; // program day not assigned to any slot
      const wdIdx = assigns[i];
      const dateKey = localDateStr(wds[wdIdx]);
      if (d.isRest) {
        dispatch({ type:"INIT_DAY", payload:{ dateKey, programDayName:d.name, exercises:[], isRest:true }});
      } else {
        dispatch({ type:"INIT_DAY", payload:{ dateKey, programDayName:d.name, exercises:d.exercises }});
      }
    });
    setApplied(true);
    setTimeout(() => dispatch({ type:"CLOSE_MODAL" }), 600);
  };

  const handleApply = () => {
    if (weekHasData) {
      setConfirmApply(true);
    } else {
      doApply();
    }
  };

  return (
    <Sheet onClose={()=>dispatch({type:"CLOSE_MODAL"})}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <h3 style={{ margin:0, fontSize:20, fontWeight:800, color:C.text }}>Set Program</h3>
          <div style={{ fontSize:13, color:C.textDim, marginTop:2 }}>{weekLabel(currentWeek)}</div>
        </div>
        <button onClick={()=>dispatch({type:"CLOSE_MODAL"})} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, width:40, height:40, display:"flex", alignItems:"center", justifyContent:"center", color:C.textDim, cursor:"pointer" }}><X s={18}/></button>
      </div>

      {/* Program picker */}
      {!selProg && (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {!confirmClear ? (
            <button onClick={() => setConfirmClear(true)} style={{
              background:"transparent", borderRadius:14, padding:"16px 18px", border:`1px solid ${C.border}`, cursor:"pointer",
              fontFamily:"inherit", display:"flex", alignItems:"center", width:"100%", gap:10,
            }}>
              <X s={16}/>
              <div style={{ textAlign:"left" }}>
                <div style={{ fontSize:16, fontWeight:700, color:C.danger }}>Clear Program</div>
                <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>Remove program from this week</div>
              </div>
            </button>
          ) : (
            <div style={{
              borderRadius:14, padding:"16px 18px", border:`1.5px solid ${C.danger}`,
              background:`${C.danger}10`, display:"flex", flexDirection:"column", gap:12,
            }}>
              <div style={{ fontSize:14, fontWeight:600, color:C.text, textAlign:"center" }}>
                Are you sure? This will clear all workout data for this week.
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setConfirmClear(false)} style={{
                  flex:1, padding:"12px", borderRadius:10, border:`1px solid ${C.border}`, background:C.surface,
                  color:C.textDim, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
                }}>Cancel</button>
                <button onClick={doClear} style={{
                  flex:1, padding:"12px", borderRadius:10, border:"none", background:C.danger,
                  color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
                }}>Yes, Clear</button>
              </div>
            </div>
          )}
          {programs.map(p => (
            <button key={p.id} onClick={()=>selectProg(p)} style={{
              background:C.card, borderRadius:14, padding:"16px 18px", border:`1px solid ${C.border}`, cursor:"pointer",
              fontFamily:"inherit", display:"flex", justifyContent:"space-between", alignItems:"center", width:"100%", textAlign:"left",
            }}>
              <div>
                <div style={{ fontSize:16, fontWeight:700, color:C.text }}>{p.name}</div>
                <div style={{ fontSize:12, color:C.textDim, marginTop:3 }}>{p.days.length} day{p.days.length>1?"s":""} — {p.days.map(d=>d.name).join(", ")}</div>
              </div>
              <Chevron dir="r"/>
            </button>
          ))}
        </div>
      )}

      {/* Day assignment */}
      {selProg && (
        <>
          <button onClick={()=>{setSelProg(null);setApplied(false);}} style={{ background:"none",border:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:0,marginBottom:16,display:"flex",alignItems:"center",gap:4 }}><Chevron dir="l"/> Choose different program</button>

          <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:16 }}>{selProg.name}</div>

          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {getDays().map((dayLabel, wi) => {
              const progIdx = slots[wi];
              const progDay = progIdx !== null ? selProg.days[progIdx] : null;
              const canMoveUp = progDay && wi > 0;
              const canMoveDown = progDay && wi < 6;

              const moveSlot = (fromIdx, toIdx) => {
                const s = [...slots];
                [s[fromIdx], s[toIdx]] = [s[toIdx], s[fromIdx]];
                setSlots(s);
              };

              return (
                <div key={wi} style={{
                  background: progDay ? C.card : "transparent",
                  borderRadius: 12, padding: progDay ? "10px 12px" : "6px 12px",
                  border: `1px solid ${progDay?.isRest ? C.success+"40" : progDay ? C.border : C.border+"60"}`,
                  display: "flex", alignItems: "center", gap: 10,
                }}>
                  {/* Day label */}
                  <div style={{ width: 36, flexShrink: 0 }}>
                    <div style={{ fontSize: 11, fontWeight: 800, color: C.accent, textTransform: "uppercase" }}>{dayLabel}</div>
                    <div style={{ fontSize: 10, color: C.textMuted }}>{wds[wi].getDate()}</div>
                  </div>

                  {/* Program day info */}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {progDay ? (
                      <>
                        <div style={{ fontSize: 13, fontWeight: 600, color: progDay.isRest ? C.success : C.text }}>
                          {progDay.name}{progDay.isRest ? " — Rest" : ""}
                        </div>
                        {!progDay.isRest && progDay.exercises && (
                          <div style={{ fontSize: 10, color: C.textMuted, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {progDay.exercises.map(e => e.name).join(", ")}
                          </div>
                        )}
                      </>
                    ) : (
                      <div style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic" }}>Empty</div>
                    )}
                  </div>

                  {/* Move arrows */}
                  {progDay && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 2, flexShrink: 0 }}>
                      <button onClick={() => canMoveUp && moveSlot(wi, wi - 1)} disabled={!canMoveUp} style={{
                        background: "none", border: `1px solid ${C.border}`, borderRadius: 6, width: 28, height: 28,
                        display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
                        color: C.textDim, opacity: canMoveUp ? 1 : 0.3,
                      }}><ArrowUp s={10}/></button>
                      <button onClick={() => canMoveDown && moveSlot(wi, wi + 1)} disabled={!canMoveDown} style={{
                        background: "none", border: `1px solid ${C.border}`, borderRadius: 6, width: 28, height: 28,
                        display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
                        color: C.textDim, opacity: canMoveDown ? 1 : 0.3,
                      }}><ArrowDown s={10}/></button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {!confirmApply ? (
            <button onClick={handleApply} disabled={applied} style={{
              width:"100%", padding:"16px", borderRadius:14, marginTop:16, border:"none",
              background: applied ? C.success : C.accent, color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer", fontFamily:"inherit",
              display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            }}>{applied ? <><Check s={16}/> Applied</> : "Apply to This Week"}</button>
          ) : (
            <div style={{
              borderRadius:14, padding:"16px 18px", marginTop:16, border:`1.5px solid ${C.danger}`,
              background:`${C.danger}10`, display:"flex", flexDirection:"column", gap:12,
            }}>
              <div style={{ fontSize:14, fontWeight:600, color:C.text, textAlign:"center" }}>
                This week already has workout data. Applying a new program will replace it. Continue?
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setConfirmApply(false)} style={{
                  flex:1, padding:"12px", borderRadius:10, border:`1px solid ${C.border}`, background:C.surface,
                  color:C.textDim, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
                }}>Cancel</button>
                <button onClick={doApply} style={{
                  flex:1, padding:"12px", borderRadius:10, border:"none", background:C.danger,
                  color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
                }}>Yes, Replace</button>
              </div>
            </div>
          )}
        </>
      )}
    </Sheet>
  );
}

// --- Exercises Tab ---
function HistoryTab({ workouts, units }) {
  const [search, setSearch] = useState("");
  const [selectedEx, setSelectedEx] = useState(null);
  const [sortBy, setSortBy] = useState("sessions");
  const [filterMuscle, setFilterMuscle] = useState("All");
  const [repFilter, setRepFilter] = useState("All"); // "All" or a number string like "5"

  // Build exercise stats from all workouts
  const exStats = {};
  Object.entries(workouts).forEach(([dateKey, day]) => {
    if (!day.exercises) return;
    day.exercises.forEach(ex => {
      if (!ex.sets || ex.isCardio) return;
      const completedSets = ex.sets.filter(s => s.done);
      if (completedSets.length === 0) return;

      if (!exStats[ex.name]) {
        exStats[ex.name] = { muscle: ex.muscle, bestWeight: 0, bestReps: 0, bestVolume: 0, bestSet: null, totalSets: 0, sessions: [], pr: null };
      }
      const stat = exStats[ex.name];

      const sessionSets = [];
      completedSets.forEach(s => {
        const w = parseFloat(s.weight) || 0;
        const r = parseInt(s.reps) || 0;
        const vol = w * r;
        sessionSets.push({ weight: w, reps: r, volume: vol });

        stat.totalSets++;
        if (w > stat.bestWeight) { stat.bestWeight = w; stat.pr = { weight: w, reps: r, date: dateKey }; }
        if (w === stat.bestWeight && r > (stat.pr?.reps || 0)) { stat.pr = { weight: w, reps: r, date: dateKey }; }
        if (r > stat.bestReps) stat.bestReps = r;
        if (vol > stat.bestVolume) { stat.bestVolume = vol; stat.bestSet = { weight: w, reps: r, date: dateKey }; }
      });

      stat.sessions.push({ date: dateKey, sets: sessionSets });
    });
  });

  // Sort: most sessions first, then alphabetical
  const exerciseList = Object.entries(exStats);

  // Get unique muscle groups
  const allMuscles = [...new Set(exerciseList.map(([_, s]) => s.muscle).filter(Boolean))].sort();

  // Apply filters and sort
  let filtered = [...exerciseList];
  if (filterMuscle !== "All") filtered = filtered.filter(([_, s]) => s.muscle === filterMuscle);
  if (search.trim()) filtered = filtered.filter(([name]) => name.toLowerCase().includes(search.toLowerCase()));

  if (sortBy === "sessions") filtered.sort((a, b) => b[1].sessions.length - a[1].sessions.length || a[0].localeCompare(b[0]));
  else if (sortBy === "alpha") filtered.sort((a, b) => a[0].localeCompare(b[0]));
  else if (sortBy === "weight") filtered.sort((a, b) => b[1].bestWeight - a[1].bestWeight);
  else if (sortBy === "recent") filtered.sort((a, b) => {
    const aLast = a[1].sessions[a[1].sessions.length - 1]?.date || "";
    const bLast = b[1].sessions[b[1].sessions.length - 1]?.date || "";
    return bLast.localeCompare(aLast);
  });

  const fmtDate = (dk) => {
    const d = new Date(dk + "T00:00:00");
    return d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
  };

  // Detail view for a single exercise
  if (selectedEx && exStats[selectedEx]) {
    const stat = exStats[selectedEx];
    const sessions = [...stat.sessions].sort((a, b) => b.date.localeCompare(a.date));

    return (
      <div style={{ padding:"20px 16px 100px" }}>
        <button onClick={()=>setSelectedEx(null)} style={{ background:"none",border:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:0,marginBottom:16,display:"flex",alignItems:"center",gap:4 }}>
          <Chevron dir="l"/> Back
        </button>
        <h2 style={{ fontSize:20, fontWeight:800, color:C.text, marginBottom:4 }}>{selectedEx}</h2>
        <Badge muscle={stat.muscle} small />

        {/* PR Cards */}
        <div style={{ display:"flex", gap:8, marginTop:16, marginBottom:12, flexWrap:"wrap" }}>
          <div style={{ flex:"1 1 45%", background:C.surface, borderRadius:12, padding:"14px", border:`1px solid ${C.border}`, textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Best Weight</div>
            <div style={{ fontSize:24, fontWeight:800, color:C.accent }}>{stat.bestWeight}<span style={{ fontSize:12, fontWeight:600, color:C.textDim }}> {units}</span></div>
            {stat.pr && <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>{stat.pr.reps} reps · {fmtDate(stat.pr.date)}</div>}
          </div>
          <div style={{ flex:"1 1 45%", background:C.surface, borderRadius:12, padding:"14px", border:`1px solid ${C.border}`, textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Est. 1RM</div>
            {(() => {
              // Epley formula: weight × (1 + reps/30). Find the set that gives the highest e1RM.
              let best1RM = 0, best1RMset = null, best1RMdate = null;
              stat.sessions.forEach(sess => {
                sess.sets.forEach(st => {
                  if (st.weight > 0 && st.reps > 0) {
                    const e1rm = st.reps === 1 ? st.weight : Math.round(st.weight * (1 + st.reps / 30));
                    if (e1rm > best1RM) { best1RM = e1rm; best1RMset = st; best1RMdate = sess.date; }
                  }
                });
              });
              return best1RM > 0 ? (
                <>
                  <div style={{ fontSize:24, fontWeight:800, color:"#c084fc" }}>{best1RM}<span style={{ fontSize:12, fontWeight:600, color:C.textDim }}> {units}</span></div>
                  <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>from {best1RMset.weight}×{best1RMset.reps} · {fmtDate(best1RMdate)}</div>
                </>
              ) : <div style={{ fontSize:14, color:C.textMuted }}>—</div>;
            })()}
          </div>
          <div style={{ flex:"1 1 45%", background:C.surface, borderRadius:12, padding:"14px", border:`1px solid ${C.border}`, textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Best Volume</div>
            <div style={{ fontSize:24, fontWeight:800, color:C.success }}>{stat.bestVolume.toLocaleString()}<span style={{ fontSize:12, fontWeight:600, color:C.textDim }}> {units}</span></div>
            {stat.bestSet && <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>{stat.bestSet.weight}x{stat.bestSet.reps} · {fmtDate(stat.bestSet.date)}</div>}
          </div>
          <div style={{ flex:"1 1 45%", background:C.surface, borderRadius:12, padding:"14px", border:`1px solid ${C.border}`, textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Sessions</div>
            <div style={{ fontSize:24, fontWeight:800, color:C.text }}>{stat.sessions.length}</div>
            <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>{stat.totalSets} total sets</div>
          </div>
        </div>

        {/* Rep count filter */}
        {(() => {
          const allReps = new Set();
          stat.sessions.forEach(sess => sess.sets.forEach(st => { if (st.reps > 0) allReps.add(st.reps); }));
          const repCounts = [...allReps].sort((a, b) => a - b);
          if (repCounts.length <= 1) return null;
          return (
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.textDim, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Filter by Reps</div>
              <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                <button onClick={()=>setRepFilter("All")} style={{
                  padding:"5px 12px", borderRadius:8, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
                  background: repFilter==="All" ? C.accent : C.card, color: repFilter==="All" ? "#fff" : C.textMuted,
                  border: repFilter==="All" ? "none" : `1px solid ${C.border}`,
                }}>All</button>
                {repCounts.map(r => (
                  <button key={r} onClick={()=>setRepFilter(String(r))} style={{
                    padding:"5px 12px", borderRadius:8, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
                    background: repFilter===String(r) ? C.accent : C.card, color: repFilter===String(r) ? "#fff" : C.textMuted,
                    border: repFilter===String(r) ? "none" : `1px solid ${C.border}`,
                  }}>{r} rep{r!==1?"s":""}</button>
                ))}
              </div>
            </div>
          );
        })()}

        {/* Progress Chart */}
        {(() => {
          const rFilter = repFilter !== "All" ? parseInt(repFilter) : null;
          const chronological = [...stat.sessions].sort((a, b) => a.date.localeCompare(b.date));
          // Filter sessions to only include sets matching rep filter
          const filtered = chronological.map(sess => ({
            ...sess,
            sets: rFilter ? sess.sets.filter(st => st.reps === rFilter) : sess.sets,
          })).filter(sess => sess.sets.length > 0);
          if (filtered.length < 2) return null;
          const points = filtered.map(sess => ({
            date: sess.date,
            weight: Math.max(...sess.sets.map(st => st.weight)),
          }));
          const minW = Math.min(...points.map(p => p.weight));
          const maxW = Math.max(...points.map(p => p.weight));
          const range = maxW - minW || 1;
          const W_CHART = 360;
          const H_CHART = 140;
          const PAD = { top: 20, right: 16, bottom: 30, left: 40 };
          const plotW = W_CHART - PAD.left - PAD.right;
          const plotH = H_CHART - PAD.top - PAD.bottom;

          const getX = (i) => PAD.left + (i / (points.length - 1)) * plotW;
          const getY = (w) => PAD.top + plotH - ((w - minW) / range) * plotH;

          const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${getX(i)},${getY(p.weight)}`).join(" ");
          const areaD = pathD + ` L${getX(points.length - 1)},${PAD.top + plotH} L${getX(0)},${PAD.top + plotH} Z`;

          // Y-axis labels (3-4 ticks)
          const ticks = [];
          const step = range <= 5 ? 1 : range <= 20 ? 5 : range <= 50 ? 10 : Math.ceil(range / 4 / 10) * 10;
          for (let v = Math.floor(minW / step) * step; v <= maxW + step; v += step) {
            if (v >= minW - step * 0.5) ticks.push(v);
          }

          return (
            <div style={{ background:C.surface, borderRadius:14, padding:"16px", border:`1px solid ${C.border}`, marginBottom:16 }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.textDim, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:12 }}>Weight Progress ({units})</div>
              <svg width="100%" viewBox={`0 0 ${W_CHART} ${H_CHART}`} style={{ display:"block" }}>
                {/* Grid lines */}
                {ticks.map((v, i) => (
                  <g key={i}>
                    <line x1={PAD.left} y1={getY(v)} x2={W_CHART - PAD.right} y2={getY(v)} stroke={C.border} strokeWidth="1"/>
                    <text x={PAD.left - 6} y={getY(v) + 4} fill={C.textMuted} fontSize="9" textAnchor="end">{Math.round(v)}</text>
                  </g>
                ))}
                {/* X-axis labels (first, last, maybe middle) */}
                {[0, points.length - 1].map(i => (
                  <text key={i} x={getX(i)} y={H_CHART - 4} fill={C.textMuted} fontSize="9" textAnchor="middle">{fmtDate(points[i].date)}</text>
                ))}
                {/* Area fill */}
                <path d={areaD} fill={C.accent} opacity="0.1"/>
                {/* Line */}
                <path d={pathD} fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                {/* Dots */}
                {points.map((p, i) => (
                  <circle key={i} cx={getX(i)} cy={getY(p.weight)} r="4" fill={C.accent} stroke={C.surface} strokeWidth="2"/>
                ))}
              </svg>
            </div>
          );
        })()}

        {/* Session history */}
        <h3 style={{ fontSize:12, fontWeight:700, color:C.textDim, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10 }}>
          Session History{repFilter !== "All" ? ` (${repFilter}-rep sets)` : ""}
        </h3>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {(() => {
            const rFilter = repFilter !== "All" ? parseInt(repFilter) : null;
            const filteredSessions = sessions.map(sess => ({
              ...sess,
              sets: rFilter ? sess.sets.filter(st => st.reps === rFilter) : sess.sets,
            })).filter(sess => sess.sets.length > 0);

            if (filteredSessions.length === 0) return (
              <div style={{ textAlign:"center", padding:"20px 0", color:C.textMuted, fontSize:13 }}>No sessions with {repFilter}-rep sets</div>
            );

            return filteredSessions.map((sess, i) => {
              const maxW = Math.max(...sess.sets.map(s => s.weight));
              const isPR = stat.pr && stat.pr.date === sess.date;
              return (
                <div key={i} style={{ background:C.surface, borderRadius:12, padding:"12px 14px", border:`1px solid ${isPR ? C.accent+"60" : C.border}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{fmtDate(sess.date)}</div>
                    {isPR && <span style={{ fontSize:10, fontWeight:700, color:C.accent, background:C.accentDim, padding:"2px 8px", borderRadius:6, display:"inline-flex", alignItems:"center", gap:3 }}><TrophyIco/> PR</span>}
                  </div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {sess.sets.map((set, j) => (
                      <div key={j} style={{
                        fontSize:12, color: set.weight === maxW ? C.accent : C.textDim, fontWeight: set.weight === maxW ? 700 : 500,
                        background:C.bg, padding:"4px 8px", borderRadius:6,
                      }}>
                        {set.weight}×{set.reps}
                      </div>
                    ))}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </div>
    );
  }

  // List view
  return (
    <div style={{ padding:"20px 16px 100px" }}>
      <h2 style={{ fontSize:22, fontWeight:800, color:C.text, marginBottom:16 }}>Exercises</h2>

        ...getInp(), marginBottom:10, fontSize:14, padding:"12px 14px",
      }} placeholder="Search exercises..." value={search} onChange={e=>setSearch(e.target.value)} />

      {exerciseList.length > 0 && <>
        {/* Muscle group filter */}
        <div style={{ display:"flex", gap:6, marginBottom:8, overflowX:"auto", paddingBottom:4, WebkitOverflowScrolling:"touch" }}>
          {["All", ...allMuscles].map(m => (
            <button key={m} onClick={()=>setFilterMuscle(m)} style={{
              padding:"6px 12px", borderRadius:16, fontSize:11, fontWeight:700, cursor:"pointer",
              fontFamily:"inherit", border:"none", whiteSpace:"nowrap", flexShrink:0,
              background: filterMuscle===m ? C.accent : C.card,
              color: filterMuscle===m ? "#fff" : C.textMuted,
              transition:"all 0.15s",
            }}>{m}</button>
          ))}
        </div>

        {/* Sort */}
        <div style={{ display:"flex", gap:4, marginBottom:14 }}>
          {[["sessions","Most Used"],["recent","Recent"],["weight","Heaviest"],["alpha","A-Z"]].map(([val,lbl]) => (
            <button key={val} onClick={()=>setSortBy(val)} style={{
              padding:"5px 10px", borderRadius:8, fontSize:10, fontWeight:700, cursor:"pointer",
              fontFamily:"inherit", background: sortBy===val ? C.accentDim : C.card,
              color: sortBy===val ? C.accent : C.textMuted, border: sortBy===val ? `1px solid ${C.accent}` : `1px solid ${C.border}`,
            }}>{lbl}</button>
          ))}
        </div>
      </>}

      {filtered.length === 0 && (
        <div style={{ textAlign:"center", padding:"40px 0", color:C.textMuted, fontSize:14 }}>
          {exerciseList.length === 0 ? "No completed sets yet. Start logging workouts to see your exercises here." : "No exercises match your filters."}
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {filtered.map(([name, stat]) => {
          const isPR = stat.bestWeight > 0;
          return (
            <button key={name} onClick={()=>{setSelectedEx(name);setRepFilter("All");}} style={{
              background:C.surface, borderRadius:12, padding:"14px 16px", border:`1px solid ${C.border}`,
              cursor:"pointer", fontFamily:"inherit", width:"100%", textAlign:"left",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div style={{ minWidth:0, flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:14, fontWeight:700, color:C.text }}>{name}</span>
                  <Badge muscle={stat.muscle} small />
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:5 }}>
                  {stat.bestWeight > 0 && (
                    <span style={{ fontSize:12, color:C.textDim }}>
                      Best: <span style={{ color:C.accent, fontWeight:700 }}>{stat.bestWeight} {units}</span>
                    </span>
                  )}
                  <span style={{ fontSize:12, color:C.textMuted }}>{stat.sessions.length} session{stat.sessions.length!==1?"s":""}</span>
                  <span style={{ fontSize:12, color:C.textMuted }}>{stat.totalSets} sets</span>
                </div>
              </div>
              <Chevron dir="r"/>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function SettingsTab({ s, d }) {

  const [confirmReset, setConfirmReset] = useState(false);
  const [openSections, setOpenSections] = useState({ appearance: false, workout: false, nutrition: false, data: false });
  const toggleSection = (key) => setOpenSections(p => ({ ...p, [key]: !p[key] }));

  const Section = ({ id, title, children }) => (
    <div style={{ marginBottom: 8 }}>
      <button onClick={() => toggleSection(id)} style={{
        width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12,
        padding: "14px 18px", cursor: "pointer", fontFamily: "inherit",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <span style={{ fontSize: 14, fontWeight: 800, color: C.text, letterSpacing: "-0.01em" }}>{title}</span>
        <ChevDown open={openSections[id]}/>
      </button>
      {openSections[id] && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10, padding: "10px 0 0" }}>
          {children}
        </div>
      )}
    </div>
  );

  const [exportData, setExportData] = useState(null);
  const [importText, setImportText] = useState("");
  const [importMode, setImportMode] = useState(false);
  const [copyFeedback, setCopyFeedback] = useState(false);

  const handleExport = () => {
    const data = JSON.stringify({ programs, schedules, workouts, theme, units, weekStart, restDefault, accentColor, logoChoice: s.logoChoice, appTitle: s.appTitle, favorites: s.favorites, nutrition: s.nutrition, nutritionFavs: s.nutritionFavs, macroGoals: s.macroGoals, timerAutoStart: s.timerAutoStart });
    setExportData(data);
    try { navigator.clipboard.writeText(data); setCopyFeedback(true); setTimeout(() => setCopyFeedback(false), 2000); } catch {}
  };

  const handleImport = () => {
    try {
      const data = JSON.parse(importText.trim());
      if (data.programs || data.workouts) {
        d({ type: "IMPORT_DATA", payload: data });
        setImportText("");
        setImportMode(false);
      }
    } catch (err) { console.error("Import failed:", err); }
  };

  return (
    <div style={{ padding:"20px 16px 100px" }}>
      <h2 style={{ fontSize:22, fontWeight:800, color:C.text, marginBottom:20 }}>Settings</h2>

          <div>
            <div style={{ fontSize:15, fontWeight:700, color:C.text }}>Theme</div>
            <div style={{ fontSize:12, color:C.textDim, marginTop:2 }}>{theme === "dark" ? "Dark mode" : "Light mode"}</div>
          </div>
          <button onClick={() => d({ type:"SET_THEME", payload: theme === "dark" ? "light" : "dark" })} style={{
            width:52, height:30, borderRadius:15, border:"none", cursor:"pointer", position:"relative",
            background: theme === "dark" ? C.accent : C.border, transition:"background 0.2s",
          }}>
            <div style={{
              width:24, height:24, borderRadius:12, background:"#fff",
              position:"absolute", top:3, left: theme === "dark" ? 25 : 3,
              transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)",
            }}/>
          </button>
        </div>

        {/* Units toggle */}
        <div style={{ background:C.surface, borderRadius:14, padding:"18px 20px", border:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:C.text }}>Units</div>
            <div style={{ fontSize:12, color:C.textDim, marginTop:2 }}>{units === "lbs" ? "Pounds (lbs)" : "Kilograms (kg)"}</div>
          </div>
          <div style={{ display:"flex", borderRadius:10, overflow:"hidden", border:`1px solid ${C.border}` }}>
            {["lbs","kg"].map(u => (
              <button key={u} onClick={() => d({ type:"SET_UNITS", payload:u })} style={{
                padding:"8px 16px", border:"none", cursor:"pointer", fontFamily:"inherit",
                fontSize:13, fontWeight:700, textTransform:"uppercase",
                background: units===u ? C.accent : "transparent",
                color: units===u ? "#fff" : C.textMuted,
                transition:"all 0.2s",
              }}>{u}</button>
            ))}
          </div>
        </div>

        {/* Accent Color */}
        <div style={{ background:C.surface, borderRadius:14, padding:"18px 20px", border:`1px solid ${C.border}` }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <div>
              <div style={{ fontSize:15, fontWeight:700, color:C.text }}>Accent Color</div>
              <div style={{ fontSize:12, color:C.textDim, marginTop:2 }}>{accentColor || "Default"}</div>
            </div>
            {accentColor && (
              <button onClick={() => d({ type:"SET_ACCENT_COLOR", payload:null })} style={{
                padding:"6px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent",
                color:C.textDim, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit",

              <button key={color} onClick={() => d({ type:"SET_ACCENT_COLOR", payload:color })} style={{

        </div>

      </Section>

      <Section id="workout" title="Workout">

              <button key={ws} onClick={() => d({ type:"SET_WEEK_START", payload:ws })} style={{
                padding:"8px 12px", border:"none", cursor:"pointer", fontFamily:"inherit",
                fontSize:12, fontWeight:700, textTransform:"capitalize",
                background: weekStart===ws ? C.accent : "transparent",
                color: weekStart===ws ? "#fff" : C.textMuted,
                transition:"all 0.2s",
              }}>{ws.slice(0,3)}</button>
            ))}
          </div>
        </div>

        {/* Default Rest Timer */}
        <div style={{ background:C.surface, borderRadius:14, padding:"18px 20px", border:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:C.text }}>Rest Timer Default</div>
            <div style={{ fontSize:12, color:C.textDim, marginTop:2 }}>{restDefault}s ({Math.floor(restDefault/60)}:{(restDefault%60).toString().padStart(2,"0")})</div>
          </div>
          <div style={{ display:"flex", borderRadius:10, overflow:"hidden", border:`1px solid ${C.border}` }}>
            {[60,90,120,180].map(t => (
              <button key={t} onClick={() => d({ type:"SET_REST_DEFAULT", payload:t })} style={{
                padding:"8px 10px", border:"none", cursor:"pointer", fontFamily:"inherit",
                fontSize:12, fontWeight:700,
                background: restDefault===t ? C.accent : "transparent",
                color: restDefault===t ? "#fff" : C.textMuted,
                transition:"all 0.2s",
              }}>{t < 120 ? `${t}s` : `${t/60}m`}</button>
            ))}
          </div>
        </div>

        {/* Timer Auto-Start */}
        <div style={{ background:C.surface, borderRadius:14, padding:"18px 20px", border:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:C.text }}>Auto-Start Timer</div>

            width:52, height:30, borderRadius:15, border:"none", cursor:"pointer", position:"relative",
            background: s.timerAutoStart !== false ? C.accent : C.border, transition:"background 0.2s",
          }}>
            <div style={{
              width:24, height:24, borderRadius:12, background:"#fff",
              position:"absolute", top:3, left: s.timerAutoStart !== false ? 25 : 3,
              transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)",
            }}/>
          </button>
        </div>

      </Section>

      <Section id="nutrition" title="Nutrition">
        {/* Macro Goals */}
        <div style={{ background:C.surface, borderRadius:14, padding:"18px 20px", border:`1px solid ${C.border}` }}>
          <div style={{ fontSize:15, fontWeight:700, color:C.text, marginBottom:12 }}>Daily Macro Goals</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 }}>
            {[["protein","Protein (g)"],["carbs","Carbs (g)"],["fat","Fat (g)"]].map(([key,lbl]) => (
              <div key={key}>
                <div style={{ fontSize:11, color:C.textMuted, marginBottom:3 }}>{lbl}</div>
                <input id={`macro-${key}`} style={{ ...getInp(), width:"100%", fontSize:14, padding:"8px 10px" }} inputMode="numeric"
                  defaultValue={(s.macroGoals||{})[key]||""}
                  onBlur={e => d({ type:"SET_MACRO_GOALS", payload:{ [key]: parseInt(e.target.value)||0 }})} />
              </div>
            ))}
          </div>
          <div style={{ background:C.card, borderRadius:10, padding:"8px 14px", border:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ fontSize:12, fontWeight:600, color:C.textMuted }}>Calories (auto)</span>
            <span style={{ fontSize:16, fontWeight:800, color:C.accent }}>{(s.macroGoals||{}).calories || 0}</span>

          <div style={{ fontSize:10, color:C.textMuted, marginTop:4, textAlign:"center" }}>Protein × 4 + Carbs × 4 + Fat × 9</div>
        </div>
      </Section>

      <Section id="data" title="Data & Backup">
        {/* Export / Import */}
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={handleExport} style={{
            flex:1, padding:"14px", borderRadius:12, border:`1px solid ${copyFeedback ? "#22c55e" : C.border}`,

            <DownloadIco/><span style={{ fontSize:13, fontWeight:600, color: copyFeedback ? "#22c55e" : C.textDim }}>{copyFeedback ? "Copied!" : "Export"}</span>

          <button onClick={() => setImportMode(!importMode)} style={{
            flex:1, padding:"14px", borderRadius:12, border:`1px solid ${importMode ? C.accent : C.border}`,
            background: importMode ? C.accentDim : C.surface,
            cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <UploadIco/><span style={{ fontSize:13, fontWeight:600, color: importMode ? C.accent : C.textDim }}>Import</span>
          </button>
        </div>

        {/* Export output */}
        {exportData && !importMode && (
          <div style={{ background:C.card, borderRadius:10, border:`1px solid ${C.border}`, padding:10 }}>
            <div style={{ fontSize:10, fontWeight:600, color:C.textMuted, marginBottom:6 }}>Backup data (copied to clipboard):</div>
            <textarea readOnly value={exportData} style={{ ...getInp(), fontSize:10, minHeight:60, resize:"vertical", fontFamily:"monospace", lineHeight:1.3 }} onFocus={e => e.target.select()} />
            <button onClick={() => setExportData(null)} style={{ marginTop:6, padding:"6px 12px", borderRadius:6, border:`1px solid ${C.border}`, background:"transparent", color:C.textMuted, fontSize:10, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>Close</button>
          </div>
        )}

        {/* Import input */}
        {importMode && (
          <div style={{ background:C.card, borderRadius:10, border:`1px solid ${C.border}`, padding:10 }}>
            <div style={{ fontSize:10, fontWeight:600, color:C.textMuted, marginBottom:6 }}>Paste your backup data:</div>
            <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste exported data here..." style={{ ...getInp(), fontSize:10, minHeight:80, resize:"vertical", fontFamily:"monospace", lineHeight:1.3 }} />
            <div style={{ display:"flex", gap:6, marginTop:6 }}>
              <button onClick={handleImport} disabled={!importText.trim()} style={{ flex:1, padding:"8px", borderRadius:6, border:"none", background: importText.trim() ? C.accent : C.border, color:"#fff", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Import Data</button>
              <button onClick={() => { setImportMode(false); setImportText(""); }} style={{ padding:"8px 12px", borderRadius:6, border:`1px solid ${C.border}`, background:"transparent", color:C.textMuted, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
            </div>
          </div>
        )}

        {/* Reset All Data */}
        {!confirmReset ? (
          <button onClick={() => setConfirmReset(true)} style={{
            width:"100%", padding:"16px", borderRadius:12, border:`1px solid ${C.danger}40`,
            background:"transparent", cursor:"pointer", fontFamily:"inherit",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <Trash s={14}/>
            <span style={{ fontSize:14, fontWeight:600, color:C.danger }}>Reset All Data</span>
          </button>
        ) : (
          <div style={{
            borderRadius:14, padding:"16px 18px", border:`1.5px solid ${C.danger}`,
            background:`${C.danger}10`, display:"flex", flexDirection:"column", gap:12,
          }}>
            <div style={{ fontSize:14, fontWeight:600, color:C.text, textAlign:"center" }}>
              Are you sure? This will permanently delete all your workouts, programs, and schedules. Your settings will be preserved.
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setConfirmReset(false)} style={{
                flex:1, padding:"12px", borderRadius:10, border:`1px solid ${C.border}`, background:C.surface,
                color:C.textDim, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
              }}>Cancel</button>
              <button onClick={() => { d({ type:"RESET_ALL_DATA" }); setConfirmReset(false); }} style={{
                flex:1, padding:"12px", borderRadius:10, border:"none", background:C.danger,
                color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
              }}>Yes, Delete Everything</button>
            </div>
          </div>
        )}
      </Section>

      {/* App info */}
      <div style={{ textAlign:"center", padding:"16px 0 0", color:C.textMuted, fontSize:12 }}>
        LIFE – Fitness v1.0
      </div>
    </div>
  );
}

// --- Timer Bubble ---
const PlayIco = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
const PauseIco = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
const ResetIco = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.26-12.26L1 10"/></svg>;
const TimerIco = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M10 2h4"/></svg>;

function TimerBubble({ timerState, onAction }) {
  const { mode, seconds, running, expanded, restDefault } = timerState;
  const fmt = (s) => { const m = Math.floor(Math.abs(s)/60); const sec = Math.abs(s)%60; return `${m}:${sec.toString().padStart(2,"0")}`; };
  const isRest = mode === "rest";
  const isOvertime = isRest && seconds < 0;

  if (!expanded) {
    return (
      <button onClick={()=>onAction("toggleExpand")} style={{
        position:"fixed", bottom:70, right:16, maxWidth:480,
        width:56, height:56, borderRadius:28, border:"none", cursor:"pointer",
        background: isOvertime ? C.danger : running ? C.accent : C.surface,
        color: running ? "#fff" : C.accent,
        boxShadow: isOvertime ? `0 4px 20px ${C.danger}60` : "0 4px 20px rgba(0,0,0,0.3)",
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", zIndex:15, fontFamily:"inherit",
        border: running ? "none" : `1.5px solid ${C.accent}`,
        animation: isOvertime ? "celebPulse 1s ease-in-out infinite" : "none",
      }}>
        {running ? (
          <span style={{ fontSize: isOvertime ? 12 : 14, fontWeight:800, lineHeight:1 }}>{isOvertime && "+"}{fmt(seconds)}</span>
        ) : (
          <TimerIco/>
        )}
      </button>
    );
  }

  return (
    <div style={{
      position:"fixed", bottom:70, left:16, right:16, maxWidth:448, margin:"0 auto",
      background:C.surface, borderRadius:20, padding:"16px 20px",
      boxShadow: isOvertime ? `0 8px 32px ${C.danger}30` : "0 8px 32px rgba(0,0,0,0.4)", zIndex:15,
      border: isOvertime ? `1.5px solid ${C.danger}` : `1px solid ${C.border}`,
    }}>
      {/* Header with mode tabs */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div style={{ display:"flex", gap:4 }}>
          {["rest","stopwatch"].map(m => (
            <button key={m} onClick={()=>onAction("setMode",m)} style={{
              padding:"6px 14px", borderRadius:8, fontSize:12, fontWeight:700, border:"none", cursor:"pointer",
              fontFamily:"inherit", textTransform:"capitalize",
              background: mode===m ? C.accentDim : "transparent", color: mode===m ? C.accent : C.textMuted,
            }}>{m === "rest" ? "Rest Timer" : "Stopwatch"}</button>
          ))}
        </div>
        <button onClick={()=>onAction("toggleExpand")} style={{
          background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:4, display:"flex",
        }}><ChevDown open={true}/></button>
      </div>

      {/* Timer display */}
      <div style={{ textAlign:"center", marginBottom:14 }}>
        <div style={{
          fontSize:48, fontWeight:800, fontFamily:"'DM Sans',monospace", letterSpacing:"-0.02em",
          color: isOvertime ? C.danger : running ? C.text : C.textDim,
        }}>
          {isOvertime && "+"}{fmt(seconds)}
        </div>
        {isRest && (
          <div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>
            {running ? (isOvertime ? "Overtime — get back to it!" : "Resting...") : "Tap play to start rest"}
          </div>
        )}
        {!isRest && (
          <div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>
            {running ? "Timing..." : "Tap play to start"}
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:12 }}>
        <button onClick={()=>onAction("reset")} style={{
          width:40, height:40, borderRadius:20, border:`1px solid ${C.border}`, background:C.card,
          cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:C.textDim,
        }}><ResetIco/></button>

        <button onClick={()=>onAction("playPause")} style={{
          width:56, height:56, borderRadius:28, border:"none",
          background: running ? C.danger : C.accent, cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center", color:"#fff",
        }}>{running ? <PauseIco/> : <PlayIco/>}</button>

        {isRest && (
          <div style={{ display:"flex", gap:4 }}>
            {[60,90,120,180].map(t => (
              <button key={t} onClick={()=>onAction("setRest",t)} style={{
                padding:"6px 8px", borderRadius:8, fontSize:11, fontWeight:700, border:"none", cursor:"pointer",
                fontFamily:"inherit",
                background: restDefault===t ? C.accentDim : C.card, color: restDefault===t ? C.accent : C.textMuted,
              }}>{t < 120 ? `${t}s` : `${t/60}m`}</button>
            ))}
          </div>
        )}
        {!isRest && <div style={{ width:40 }}/>}
      </div>
    </div>
  );
}

// Nutrition icon (fork & knife)
const NutritionIco = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>;

// --- Main ---

function App() {
  const [s, d] = usePersisted();
  const { workouts, programs, schedules, currentWeek, expandedDay, modal, modalDay, tab, theme, favorites } = s;

  // Apply theme
  C = theme === "light" ? { ...LIGHT } : { ...DARK };
  if (s.accentColor) {
    C.accent = s.accentColor;
    C.accentDim = s.accentColor + "20";
  }
  U = s.units || "lbs";
  W = WEEK_STARTS[s.weekStart] ?? 6;

  // Timer state
  const rd = s.restDefault || 90;
  const [timer, setTimer] = useState({ mode:"rest", seconds:rd, running:false, expanded:false, restDefault:rd });
  const timerRef = useRef(null);
  const swipeRef = useRef({ startX: 0, startY: 0 });
  const [swipeOffset, setSwipeOffset] = useState(0);
  const [swiping, setSwiping] = useState(false);

  // Tab animation
  const TAB_ORDER = ["workout","programs","history","settings"];
  const prevTabRef = useRef(tab);
  const [tabAnim, setTabAnim] = useState({ active: false, dir: 0 });

  useEffect(() => {
    if (prevTabRef.current !== tab) {
      const oldIdx = TAB_ORDER.indexOf(prevTabRef.current);
      const newIdx = TAB_ORDER.indexOf(tab);
      const dir = newIdx > oldIdx ? 1 : -1;
      setTabAnim({ active: true, dir });
      const t = setTimeout(() => setTabAnim({ active: false, dir: 0 }), 300);
      prevTabRef.current = tab;
      return () => clearTimeout(t);
    }
  }, [tab]);

  const handleSwipeStart = (e) => {
    const t = e.touches[0];
    swipeRef.current = { startX: t.clientX, startY: t.clientY, locked: false, isHorizontal: null };
  };
  const handleSwipeMove = (e) => {
    const t = e.touches[0];
    const dx = t.clientX - swipeRef.current.startX;
    const dy = t.clientY - swipeRef.current.startY;
    // Determine direction on first significant movement
    if (swipeRef.current.isHorizontal === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      swipeRef.current.isHorizontal = Math.abs(dx) > Math.abs(dy);
    }
    if (swipeRef.current.isHorizontal) {
      setSwiping(true);
      setSwipeOffset(dx);
    }
  };
  const handleSwipeEnd = (e) => {
    const dx = swipeOffset;
    if (swiping && Math.abs(dx) > 60) {
      const dd = new Date(currentWeek + "T00:00:00");
      dd.setDate(dd.getDate() + (dx < 0 ? 7 : -7));
      d({ type: "SET_WEEK", payload: weekKey(dd) });
    }
    setSwiping(false);
    setSwipeOffset(0);
  };

  // Sync timer restDefault when setting changes
  useEffect(() => {
    setTimer(p => ({ ...p, restDefault: rd, seconds: p.running ? p.seconds : (p.mode === "rest" ? rd : p.seconds) }));
  }, [rd]);

  useEffect(() => {
    if (timer.running) {
      timerRef.current = setInterval(() => {
        setTimer(prev => {
          if (prev.mode === "rest") return { ...prev, seconds: prev.seconds - 1 };
          return { ...prev, seconds: prev.seconds + 1 };
        });
      }, 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [timer.running]);

  const timerAction = (action, val) => {
    switch(action) {
      case "toggleExpand": setTimer(p => ({ ...p, expanded: !p.expanded })); break;
      case "setMode": setTimer(p => ({ ...p, mode: val, seconds: val==="rest" ? p.restDefault : 0, running: false })); break;
      case "playPause": setTimer(p => ({ ...p, running: !p.running })); break;
      case "reset": setTimer(p => ({ ...p, seconds: p.mode==="rest" ? p.restDefault : 0, running: false })); break;
      case "setRest": setTimer(p => ({ ...p, restDefault: val, seconds: p.running ? p.seconds : val })); break;
      case "autoStart": setTimer(p => ({ ...p, mode:"rest", seconds: p.restDefault, running: true, expanded: false })); break;
    }
  };

  // Celebration state
  const [celebration, setCelebration] = useState(null); // { dateKey } or null

  // Wrapper dispatch that intercepts TOGGLE_SET_DONE to auto-start rest timer + check day completion
  const dispatch = (action) => {
    if (action.type === "TOGGLE_SET_DONE") {
      const { dateKey, exId, setIdx } = action.payload;
      const day = workouts[dateKey];
      if (day) {
        const ex = day.exercises.find(e => e.id === exId);
        if (ex) {
          const set = ex.sets[setIdx];
          if (set && !set.done) {
            timerAction(s.timerAutoStart !== false ? "autoStart" : null);

            // Check if this toggle will complete the entire day
            const allOtherDone = day.exercises.every(e => {
              if (e.id === exId) {
                return e.sets.every((st, si) => si === setIdx ? true : st.done);
              }
              return e.sets.every(st => st.done);
            });
            if (allOtherDone && day.exercises.length > 0) {
              setTimeout(() => setCelebration({ dateKey }), 100);
              setTimeout(() => setCelebration(null), 2500);
            }
          }
        }
      }
    }
    d(action);
  };

  const today = new Date();
  const todayKey = localDateStr(today);
  const wds = weekDates(currentWeek);

  const weekSchedule = schedules[currentWeek] || null;
  const dayNames = {};
  if (weekSchedule) {
    const prog = programs.find(p => p.id === weekSchedule.programId);
    if (prog) {
      Object.entries(weekSchedule.assignments).forEach(([pdi, wdi]) => {
        const dk = localDateStr(wds[wdi]);
        dayNames[dk] = prog.days[parseInt(pdi)]?.name || "";
      });
    }
  }
  Object.entries(workouts).forEach(([dk, w]) => { if (w.programDayName && !dayNames[dk]) dayNames[dk] = w.programDayName; });
  const activeProgramName = weekSchedule ? (programs.find(p => p.id === weekSchedule.programId)?.name || "") : "";

  const tabBtn = (id, label, Icon) => (
    <button onClick={()=>d({type:"SET_TAB",payload:id})} style={{
      flex:1, background:"none", border:"none", cursor:"pointer", padding:"6px 0 2px",
      display:"flex", flexDirection:"column", alignItems:"center", gap:4, fontFamily:"inherit",
      color: tab===id ? C.accent : C.textMuted, transition:"color 0.2s",
    }}>
      <Icon/>
      <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.02em" }}>{label}</span>
      <div style={{ width:4, height:4, borderRadius:2, background: tab===id ? C.accent : "transparent", transition:"background 0.2s" }}/>
    </button>
  );

  return (
    <div style={{ fontFamily:"'DM Sans','SF Pro Display',-apple-system,sans-serif", background:C.bg, minHeight:"100vh", color:C.text, maxWidth:480, margin:"0 auto", WebkitTapHighlightColor:"transparent" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&display=swap');
        *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
        html{background:${C.bg}} ::-webkit-scrollbar{display:none}
        input::placeholder{color:${C.textMuted}} input{font-size:16px!important} select{font-size:16px!important} textarea::placeholder{color:${C.textMuted}}
        @keyframes slideInLeft { from { transform:translateX(100%); opacity:0.5; } to { transform:translateX(0); opacity:1; } }
        @keyframes slideInRight { from { transform:translateX(-100%); opacity:0.5; } to { transform:translateX(0); opacity:1; } }
        @keyframes celebFadeIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
        @keyframes celebFadeOut { from { opacity:1; } to { opacity:0; } }
        @keyframes confettiFall { 0% { transform:translateY(-20px) rotate(0deg); opacity:1; } 100% { transform:translateY(120px) rotate(720deg); opacity:0; } }
        @keyframes celebPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
      `}</style>

      {/* Header */}
      <div style={{ padding:"12px 20px", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, zIndex:10, background: theme === "light" ? "#1e2a4a" : C.bg, overflow:"hidden" }}>
        <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, background: theme === "light" ? "none" : `linear-gradient(135deg, transparent 20%, ${C.accent})`, opacity:0.12, pointerEvents:"none" }}/>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", position:"relative" }}>
          <img src={LIFE_LOGO} alt="Logo" style={{ width:42, height:42, borderRadius:10, objectFit:"cover", boxShadow:`0 2px 8px rgba(0,0,0,0.3)` }}/>
          {tab === "workout" && (
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <button onClick={()=>{const dd=new Date(currentWeek+"T00:00:00");dd.setDate(dd.getDate()-7);d({type:"SET_WEEK",payload:weekKey(dd)});}} style={{ background:"transparent",border:"none",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",color: theme==="light" ? "#fff" : C.textDim,cursor:"pointer" }}><Chevron dir="l"/></button>
              <div style={{ textAlign:"center", minWidth:100 }}>
                <div style={{ fontSize:14, fontWeight:700, color: theme==="light" ? "#fff" : C.text }}>{weekLabel(currentWeek)}</div>
                {currentWeek===weekKey(new Date()) ? (
                  <div style={{ fontSize:9, color: theme==="light" ? "rgba(255,255,255,0.6)" : C.accent, fontWeight:700, marginTop:1, letterSpacing:"0.1em", textTransform:"uppercase" }}>This Week</div>
                ) : (
                  <button onClick={()=>d({type:"SET_WEEK",payload:weekKey(new Date())})} style={{
                    background: theme==="light" ? "rgba(255,255,255,0.2)" : C.accentDim, border:"none", borderRadius:6, padding:"2px 10px",
                    marginTop:2, cursor:"pointer", fontFamily:"inherit",
                    fontSize:9, fontWeight:700, color: theme==="light" ? "#fff" : C.accent, letterSpacing:"0.06em", textTransform:"uppercase",
                  }}>Today</button>
                )}
              </div>
              <button onClick={()=>{const dd=new Date(currentWeek+"T00:00:00");dd.setDate(dd.getDate()+7);d({type:"SET_WEEK",payload:weekKey(dd)});}} style={{ background:"transparent",border:"none",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",color: theme==="light" ? "#fff" : C.textDim,cursor:"pointer" }}><Chevron dir="r"/></button>
            </div>
          )}
        </div>
      </div>

      {/* Tab content */}
      <div style={{
        animation: tabAnim.active ? (tabAnim.dir > 0 ? "slideInLeft 0.25s ease-out" : "slideInRight 0.25s ease-out") : "none",
        overflow: "hidden",
      }}>
      {tab === "workout" && (
        <div onTouchStart={handleSwipeStart} onTouchMove={handleSwipeMove} onTouchEnd={handleSwipeEnd}>

          {/* Swipe indicator */}
          {swiping && Math.abs(swipeOffset) > 20 && (() => {
            const goingNext = swipeOffset < 0;
            const progress = Math.min(Math.abs(swipeOffset) / 60, 1);
            const targetDate = new Date(currentWeek + "T00:00:00");
            targetDate.setDate(targetDate.getDate() + (goingNext ? 7 : -7));
            const targetLabel = weekLabel(weekKey(targetDate));
            return (
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                padding:"10px 20px",
                opacity: progress,
                transform: `translateX(${swipeOffset * 0.3}px)`,
                transition: "none",
              }}>
                {!goingNext && <Chevron dir="l"/>}
                <div style={{
                  background: progress >= 1 ? C.accent : C.surface,
                  border: `1.5px solid ${progress >= 1 ? C.accent : C.border}`,
                  borderRadius:12, padding:"8px 16px",
                  display:"flex", alignItems:"center", gap:8,
                  boxShadow: `0 4px 16px rgba(0,0,0,${progress * 0.2})`,
                }}>
                  <span style={{
                    fontSize:13, fontWeight:700,
                    color: progress >= 1 ? "#fff" : C.textDim,
                  }}>{goingNext ? "Next" : "Prev"}: {targetLabel}</span>
                </div>
                {goingNext && <Chevron dir="r"/>}
              </div>
            );
          })()}

          <div style={{ padding:"8px 16px 0" }}>
            <WeeklyStats workouts={workouts} currentWeek={currentWeek} />
          </div>


          <div style={{ padding:"12px 16px 0", display:"flex", gap:8 }}>
            <button onClick={()=>d({type:"OPEN_MODAL",payload:{modal:"setProgram"}})} style={{
              flex:1, padding:"12px 16px", borderRadius:12,
              background:C.surface, border:`1px solid ${C.border}`, cursor:"pointer",
              fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            }}>
              <ListIco />
              <span style={{ fontSize:14, fontWeight:600, color:C.accent }}>Set Program</span>
            </button>
            <button onClick={()=>d({type:"COPY_LAST_WEEK",payload:{currentWeek}})} style={{
              padding:"12px 16px", borderRadius:12,
              background:C.surface, border:`1px solid ${C.border}`, cursor:"pointer",
              fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:6,
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              <span style={{ fontSize:13, fontWeight:600, color:C.textDim }}>Copy Last Week</span>
            </button>
          </div>

          <div style={{ padding:"12px 16px 0", display:"flex", flexDirection:"column", gap:8 }}>
            {wds.map((date, i) => {
              const dk = localDateStr(date);
              return <DayRow key={dk} dayLbl={getDays()[i]} date={date} dateKey={dk}
                workout={workouts[dk]} programDayName={dayNames[dk]} activeProgramName={activeProgramName}
                isToday={dk===todayKey} isExpanded={expandedDay===dk} dispatch={dispatch}
                hasPrograms={programs.length > 0} allWorkouts={workouts}
                nutrition={s.nutrition} nutritionFavs={s.nutritionFavs} macroGoals={s.macroGoals} />;
            })}
          </div>

          <div style={{ padding:"8px 16px 100px" }} />
        </div>
      )}

      {tab === "programs" && <ProgramsTab programs={programs} currentWeek={currentWeek} favorites={favorites} dispatch={d} />}
      {tab === "history" && <HistoryTab workouts={workouts} units={s.units} />}
      {tab === "settings" && <SettingsTab s={s} d={d} />}
      </div>

      {/* Timer Bubble */}
      {tab === "workout" && <TimerBubble timerState={timer} onAction={timerAction} />}

      {/* Bottom Tab Bar */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0, maxWidth:480, margin:"0 auto",
        background:C.surface, borderTop:`1px solid ${C.border}`,
        display:"flex", padding:"8px 0 env(safe-area-inset-bottom, 10px)", zIndex:20,
        boxShadow:`0 -4px 24px rgba(0,0,0,0.25), 0 -1px 8px ${C.accent}15`,
      }}>
        {tabBtn("workout", "Workout", DumbbellTab)}
        {tabBtn("programs", "Programs", ListIco)}
        {tabBtn("history", "Exercises", HistoryIco)}
        {tabBtn("settings", "Settings", GearIco)}
      </div>

      {/* Modals */}
      {modal==="addExercise" && modalDay && <AddExerciseModal dateKey={modalDay} dispatch={d} workouts={workouts} programs={programs} exerciseFavs={s.exerciseFavs} />}
      {modal==="assignDay" && modalDay && <AssignDayModal dateKey={modalDay} programs={programs} dispatch={d} />}
      {modal==="programs" && <ProgramsModal dispatch={d} programs={programs} currentWeek={currentWeek} favorites={favorites} />}
      {modal==="setProgram" && <SetProgramModal dispatch={d} programs={programs} currentWeek={currentWeek} workouts={workouts} />}

      {/* First-launch welcome prompt */}
      {Object.keys(workouts).length === 0 && Object.keys(schedules).length === 0 && tab === "workout" && !modal && (
        <div style={{
          position:"fixed", inset:0, maxWidth:480, margin:"0 auto", zIndex:50,
          background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center",
          padding:20,
        }}>
          <div style={{
            background:C.surface, borderRadius:20, padding:"36px 24px 28px", border:`1px solid ${C.border}`,
            textAlign:"center", maxWidth:340, width:"100%",
            boxShadow:`0 16px 48px rgba(0,0,0,0.4)`,
            display:"flex", flexDirection:"column", alignItems:"center",
          }}>
            <img src={LIFE_LOGO} alt="LIFE" style={{ width:88, height:88, borderRadius:18, objectFit:"cover", marginBottom:20, boxShadow:`0 4px 16px rgba(0,0,0,0.3)` }}/>
            <h2 style={{ fontSize:22, fontWeight:800, color:C.text, margin:"0 0 6px", letterSpacing:"-0.02em" }}>Fitness</h2>
            <p style={{ fontSize:14, color:C.textMuted, margin:"0 0 20px", lineHeight:1.5 }}>Welcome! Pick a program to get started, or add exercises manually to any day.</p>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <button onClick={()=>d({type:"OPEN_MODAL",payload:{modal:"setProgram"}})} style={{
                padding:"14px", borderRadius:14, border:"none", background:C.accent, color:"#fff",
                fontSize:16, fontWeight:800, cursor:"pointer", fontFamily:"inherit",
                boxShadow:`0 4px 12px ${C.accent}40`,
              }}>Choose a Program</button>
              <button onClick={()=>d({type:"SET_TAB",payload:"programs"})} style={{
                padding:"12px", borderRadius:12, border:`1px solid ${C.border}`, background:"transparent",
                color:C.textDim, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
              }}>Browse All Programs</button>
              <button onClick={()=>{
                const dk = localDateStr(new Date());
                d({type:"INIT_DAY", payload:{ dateKey:dk, programDayName:"Custom", exercises:[], isRest:false }});
                d({type:"TOGGLE_DAY", payload:dk});
              }} style={{
                padding:"10px", background:"none", border:"none", color:C.textMuted,
                fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:"inherit",
              }}>Skip — I'll add exercises manually</button>
            </div>
          </div>
        </div>
      )}

      {/* Celebration overlay */}
      {celebration && (
        <div style={{
          position:"fixed", inset:0, maxWidth:480, margin:"0 auto", zIndex:100,
          display:"flex", alignItems:"center", justifyContent:"center",
          pointerEvents:"none",
          animation:"celebFadeIn 0.3s ease-out, celebFadeOut 0.5s ease-in 2s forwards",
        }}>
          {/* Confetti particles */}
          {Array.from({ length: 30 }, (_, i) => {
            const colors = ["#22c55e","#eab308","#ef4444","#3b82f6","#a855f7","#ec4899","#f97316"];
            const left = Math.random() * 100;
            const delay = Math.random() * 0.8;
            const size = 6 + Math.random() * 8;
            const color = colors[i % colors.length];
            return (
              <div key={i} style={{
                position:"absolute", top:"20%", left:`${left}%`,
                width:size, height:size * 0.6, borderRadius:2,
                background:color, opacity:0.9,
                animation:`confettiFall ${1.2 + Math.random() * 1}s ease-in ${delay}s both`,
              }}/>
            );
          })}
          {/* Message */}
          <div style={{
            background:C.success, borderRadius:20, padding:"20px 32px",
            boxShadow:`0 8px 32px rgba(0,0,0,0.4), 0 0 60px ${C.success}40`,
            animation:"celebPulse 0.6s ease-in-out 2",
            textAlign:"center",
          }}>
            <div style={{ fontSize:28, marginBottom:4 }}>💪</div>
            <div style={{ fontSize:18, fontWeight:800, color:"#fff", letterSpacing:"-0.02em" }}>Workout Complete!</div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,0.8)", marginTop:4 }}>All sets done. Great work!</div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
