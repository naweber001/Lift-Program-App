function getDays() {

  return [...ALL_DAYS.slice(idx), ...ALL_DAYS.slice(0, idx)];
}

// Format date as YYYY-MM-DD in local timezone (avoids UTC shift from toISOString)
function localDateStr(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function weekKey(date) {
  const d = new Date(date); const day = d.getDay();
  // Find most recent occurrence of W (week start day)
  const diff = (day - W + 7) % 7;
  const start = new Date(d); start.setDate(d.getDate() - diff);
  return localDateStr(start);
}
function weekDates(wk) {
  const start = new Date(wk + "T00:00:00");
  return getDays().map((_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
}
function weekLabel(wk) {
  const ds = weekDates(wk); const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${m[ds[0].getMonth()]} ${ds[0].getDate()} - ${m[ds[6].getMonth()]} ${ds[6].getDate()}`;
}
function dayIdx(dateKey) { const d = new Date(dateKey+"T00:00:00").getDay(); return (d - W + 7) % 7; }
function dayName(dateKey) { return getDays()[dayIdx(dateKey)]; }

// Converts program exercises (index-based supersetWith) to workout exercises (id-based supersetWith)
// If prevWorkouts provided, auto-fills weights from the most recent session of each exercise
function buildExercises(exercises, prevWorkouts) {
  // Build a lookup: exerciseName -> last logged sets (most recent first)
  const lastWeights = {};
  if (prevWorkouts) {
    const sortedDates = Object.keys(prevWorkouts).sort().reverse();
    sortedDates.forEach(dk => {
      const day = prevWorkouts[dk];
      if (!day.exercises) return;
      day.exercises.forEach(ex => {
        if (lastWeights[ex.name]) return; // already found a more recent one
        const completedSets = ex.sets?.filter(st => st.done && st.weight);
        if (completedSets && completedSets.length > 0) {
          lastWeights[ex.name] = completedSets;
        }
      });
    });
  }

  const base = Date.now();
  const exs = exercises.map((e, i) => {
    const numSets = parseInt(e.targetSets) || 3;
    const prev = lastWeights[e.name];
    const sets = Array.from({ length: numSets }, (_, si) => {
      // Auto-fill weight from previous session's corresponding set, or last set if fewer
      const prevSet = prev ? (prev[si] || prev[prev.length - 1]) : null;
      return { weight: prevSet ? prevSet.weight : "", reps: "", done: false };
    });
    return {
      id: base + i, name: e.name, muscle: e.muscle,
      targetSets: numSets, targetReps: e.targetReps || "",
      isCardio: CARDIO_GROUPS.has(e.muscle),
      sets,
      supersetWith: null,
    };
  });
  // Map index-based supersetWith to id-based
  exercises.forEach((e, i) => {
    if (e.supersetWithIdx != null && e.supersetWithIdx >= 0 && e.supersetWithIdx < exs.length) {
      exs[i].supersetWith = exs[e.supersetWithIdx].id;
    }
  });
  return exs;
}

function reducer(s, a) {
  switch (a.type) {
    case "SET_WEEK": return { ...s, currentWeek: a.payload, expandedDay: null };
    case "TOGGLE_DAY": return { ...s, expandedDay: s.expandedDay === a.payload ? null : a.payload };
    case "OPEN_MODAL": return { ...s, modal: a.payload.modal, modalDay: a.payload.day || null };
    case "CLOSE_MODAL": return { ...s, modal: null, modalDay: null };
    case "SET_TAB": return { ...s, tab: a.payload };
    case "SET_THEME": return { ...s, theme: a.payload };
    case "SET_UNITS": {
      const newU = a.payload;
      if (newU === s.units) return s;
      // Convert all stored weights
      const factor = newU === "kg" ? 0.453592 : 2.20462; // lbs->kg or kg->lbs
      const convertedWorkouts = {};
      Object.entries(s.workouts).forEach(([dk, day]) => {
        if (!day.exercises || day.isRest) { convertedWorkouts[dk] = day; return; }
        convertedWorkouts[dk] = {
          ...day,
          exercises: day.exercises.map(ex => ({
            ...ex,
            sets: ex.sets.map(st => {
              const w = parseFloat(st.weight);
              if (!w && w !== 0) return st;
              if (!st.weight || st.weight === "") return st;
              const converted = Math.round(w * factor * 10) / 10;
              return { ...st, weight: String(converted) };
            }),
          })),
        };
      });
      return { ...s, units: newU, workouts: convertedWorkouts };
    }

    case "SET_WEEK_START": {
      W = WEEK_STARTS[a.payload] ?? 6;
      return { ...s, weekStart: a.payload, currentWeek: weekKey(new Date()) };
    }
    case "SET_REST_DEFAULT": return { ...s, restDefault: a.payload };
    case "SET_ACCENT_COLOR": return { ...s, accentColor: a.payload };
    case "SET_LOGO": return { ...s, logoChoice: a.payload };
    case "SET_APP_TITLE": return { ...s, appTitle: a.payload };
    case "TOGGLE_FAVORITE": {
      const id = a.payload;
      const favs = s.favorites || [];
      return { ...s, favorites: favs.includes(id) ? favs.filter(f => f !== id) : [...favs, id] };
    }
    case "TOGGLE_EXERCISE_FAV": {
      const name = a.payload;
      const favs = s.exerciseFavs || [];
      return { ...s, exerciseFavs: favs.includes(name) ? favs.filter(f => f !== name) : [...favs, name] };
    }

    // Nutrition — meals are groups containing food items
    // meal structure: { id, name, items: [{ id, name, calories, protein, carbs, fat }] }
    case "ADD_MEAL": {
      const { dateKey, mealName } = a.payload;
      const dayMeals = s.nutrition[dateKey]?.meals || [];
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals: [...dayMeals, { id: Date.now(), name: mealName || "Meal", items: [] }] } } };
    }
    case "DELETE_MEAL": {
      const { dateKey, mealId } = a.payload;
      const meals = (s.nutrition[dateKey]?.meals || []).filter(m => m.id !== mealId);
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "RENAME_MEAL": {
      const { dateKey, mealId, name } = a.payload;
      const meals = (s.nutrition[dateKey]?.meals || []).map(m => m.id === mealId ? { ...m, name } : m);
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "MOVE_MEAL": {
      const { dateKey, mealId, direction } = a.payload;
      const meals = [...(s.nutrition[dateKey]?.meals || [])];
      const idx = meals.findIndex(m => m.id === mealId);
      const newIdx = idx + direction;
      if (idx < 0 || newIdx < 0 || newIdx >= meals.length) return s;
      [meals[idx], meals[newIdx]] = [meals[newIdx], meals[idx]];
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "ADD_FOOD_ITEM": {
      const { dateKey, mealId, item } = a.payload;
      const meals = (s.nutrition[dateKey]?.meals || []).map(m =>
        m.id === mealId ? { ...m, items: [...(m.items || []), { ...item, id: Date.now() }] } : m
      );
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "DELETE_FOOD_ITEM": {
      const { dateKey, mealId, itemId } = a.payload;
      const meals = (s.nutrition[dateKey]?.meals || []).map(m =>
        m.id === mealId ? { ...m, items: (m.items || []).filter(i => i.id !== itemId) } : m
      );
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "EDIT_FOOD_ITEM": {
      const { dateKey, mealId, itemId, updated } = a.payload;
      const meals = (s.nutrition[dateKey]?.meals || []).map(m =>
        m.id === mealId ? { ...m, items: (m.items || []).map(i => i.id === itemId ? { ...i, ...updated } : i) } : m
      );
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "MOVE_FOOD_ITEM": {
      const { dateKey, mealId, itemId, direction } = a.payload;
      const meals = (s.nutrition[dateKey]?.meals || []).map(m => {
        if (m.id !== mealId) return m;
        const items = [...(m.items || [])];
        const idx = items.findIndex(i => i.id === itemId);
        const newIdx = idx + direction;
        if (idx < 0 || newIdx < 0 || newIdx >= items.length) return m;
        [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
        return { ...m, items };
      });
      return { ...s, nutrition: { ...s.nutrition, [dateKey]: { meals } } };
    }
    case "ADD_NUTRITION_FAV": {
      return { ...s, nutritionFavs: [...(s.nutritionFavs || []), a.payload] };
    }
    case "DELETE_NUTRITION_FAV": {
      return { ...s, nutritionFavs: (s.nutritionFavs || []).filter((_, i) => i !== a.payload) };
    }
    case "SET_MACRO_GOALS": {
      const updated = { ...s.macroGoals, ...a.payload };
      // Auto-calculate calories: protein 4cal/g, carbs 4cal/g, fat 9cal/g
      updated.calories = (updated.protein * 4) + (updated.carbs * 4) + (updated.fat * 9);
      return { ...s, macroGoals: updated };
    }
    case "SET_TIMER_AUTO_START": return { ...s, timerAutoStart: a.payload };

    case "RESET_ALL_DATA": return { ...init, theme: s.theme, units: s.units, weekStart: s.weekStart, restDefault: s.restDefault, accentColor: s.accentColor, logoChoice: s.logoChoice, appTitle: s.appTitle, favorites: s.favorites, macroGoals: s.macroGoals, currentWeek: weekKey(new Date()) };

    case "ADD_PROGRAM": return { ...s, programs: [...s.programs, a.payload] };
    case "UPDATE_PROGRAM": return { ...s, programs: s.programs.map(p => p.id === a.payload.id ? a.payload : p) };
    case "IMPORT_DATA": {
      const { programs: ip, schedules: isch, schedule: is, workouts: iw } = a.payload;
      // Support importing old single-schedule format too
      let newSchedules = s.schedules;
      if (isch) newSchedules = isch;
      else if (is) newSchedules = { ...s.schedules, legacy: is };
      return { ...s, programs: ip || s.programs, schedules: newSchedules, workouts: iw || s.workouts };
    }
    case "DELETE_PROGRAM": {
      const newProgs = s.programs.filter(p => p.id !== a.payload);
      const newScheds = { ...s.schedules };
      Object.keys(newScheds).forEach(wk => { if (newScheds[wk]?.programId === a.payload) delete newScheds[wk]; });
      return { ...s, programs: newProgs, schedules: newScheds };
    }
    case "SET_SCHEDULE": {
      const { weekKey: wk, programId, assignments } = a.payload;
      return { ...s, schedules: { ...s.schedules, [wk]: { programId, assignments } } };
    }
    case "CLEAR_SCHEDULE": {
      const newScheds = { ...s.schedules };
      delete newScheds[a.payload];
      return { ...s, schedules: newScheds };
    }

    // Replace a day's workout entirely (from program day picker)
    case "REPLACE_DAY": {
      const { dateKey, programDayName, exercises, isRest } = a.payload;
      if (isRest) {
        return { ...s, workouts: { ...s.workouts, [dateKey]: { programDayName, isRest: true, exercises: [] } }, modal: null, modalDay: null };
      }
      const exs = buildExercises(exercises, s.workouts);
      return { ...s, workouts: { ...s.workouts, [dateKey]: { programDayName, isRest: false, exercises: exs } }, modal: null, modalDay: null };
    }

    // Clear a day
    case "SET_DAY_NOTES": {
      const { dateKey, notes } = a.payload;
      const day = s.workouts[dateKey] || { programDayName: "", exercises: [] };
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, notes } } };
    }

    case "CLEAR_DAY": {
      const w = { ...s.workouts }; delete w[a.payload];
      return { ...s, workouts: w, modal: null, modalDay: null };
    }

    // Copy last week's workouts into current week
    case "COPY_LAST_WEEK": {
      const { currentWeek: cw } = a.payload;
      const cwDate = new Date(cw + "T00:00:00");
      const prevDate = new Date(cwDate); prevDate.setDate(prevDate.getDate() - 7);
      const prevWeek = weekKey(prevDate);
      const prevDates = weekDates(prevWeek);
      const curDates = weekDates(cw);
      const newWorkouts = { ...s.workouts };
      // Also copy schedule
      const newScheds = { ...s.schedules };
      if (s.schedules[prevWeek]) newScheds[cw] = { ...s.schedules[prevWeek] };

      for (let i = 0; i < 7; i++) {
        const prevKey = localDateStr(prevDates[i]);
        const curKey = localDateStr(curDates[i]);
        if (newWorkouts[curKey]) continue; // don't overwrite existing
        const prevDay = s.workouts[prevKey];
        if (!prevDay) continue;
        if (prevDay.isRest) {
          newWorkouts[curKey] = { programDayName: prevDay.programDayName, isRest: true, exercises: [] };
        } else {
          // Deep copy exercises with weights pre-filled but sets unchecked
          const exs = prevDay.exercises.map(ex => ({
            ...ex,
            id: Date.now() + Math.random(),
            sets: ex.sets.map(st => ({
              ...st,
              done: false,
            })),
          }));
          newWorkouts[curKey] = { programDayName: prevDay.programDayName, isRest: false, exercises: exs };
        }
      }
      return { ...s, workouts: newWorkouts, schedules: newScheds };
    }
    case "INIT_DAY": {
      const { dateKey, programDayName, exercises, isRest } = a.payload;
      if (s.workouts[dateKey]) return s;
      if (isRest) {
        return { ...s, workouts: { ...s.workouts, [dateKey]: { programDayName, isRest: true, exercises: [] } } };
      }
      const exs = buildExercises(exercises, s.workouts);
      return { ...s, workouts: { ...s.workouts, [dateKey]: { programDayName, isRest: false, exercises: exs } } };
    }

    // Add a standalone exercise
    case "ADD_EXERCISE": {
      const { dateKey, exercise } = a.payload;
      const day = s.workouts[dateKey] || { programDayName: "", exercises: [] };
      const isC = CARDIO_GROUPS.has(exercise.muscle);
      const fromProgram = exercise.fromProgram;
      const numSets = fromProgram ? (parseInt(exercise.targetSets) || 3) : 1;
      const ex = {
        id: Date.now(), name: exercise.name, muscle: exercise.muscle,
        targetSets: parseInt(exercise.targetSets) || (fromProgram ? 3 : 0), targetReps: exercise.targetReps || "",
        isCardio: isC,
        sets: isC
          ? [{ duration: "", done: false }]
          : Array.from({ length: numSets }, () => ({ weight: "", reps: "", done: false })),
      };
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: [...day.exercises, ex] } }, modal: null, modalDay: null };
    }

    case "DELETE_EXERCISE": {
      const { dateKey, exId } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      // Unpair partner if this exercise was in a superset
      let exs = day.exercises.filter(e => e.id !== exId);
      exs = exs.map(e => e.supersetWith === exId ? { ...e, supersetWith: null } : e);
      if (exs.length === 0) { const w = { ...s.workouts }; delete w[dateKey]; return { ...s, workouts: w }; }
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    case "MOVE_EXERCISE": {
      const { dateKey, exId, direction } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const exs = [...day.exercises];
      const idx = exs.findIndex(e => e.id === exId);
      if (idx < 0) return s;
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= exs.length) return s;
      // If exercise is in a superset, move the partner too
      const ex = exs[idx];
      if (ex.supersetWith) {
        const partnerIdx = exs.findIndex(e => e.id === ex.supersetWith);
        // Move both: remove both, reinsert at new position
        const pair = [exs[Math.min(idx, partnerIdx)], exs[Math.max(idx, partnerIdx)]];
        const rest = exs.filter(e => e.id !== ex.id && e.id !== ex.supersetWith);
        const insertAt = Math.max(0, Math.min(rest.length, Math.min(idx, partnerIdx) + direction));
        rest.splice(insertAt, 0, ...pair);
        return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: rest } } };
      }
      [exs[idx], exs[newIdx]] = [exs[newIdx], exs[idx]];
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    case "PAIR_SUPERSET": {
      const { dateKey, exId1, exId2 } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      // Unpair any existing partners first, then pair these two
      const exs = day.exercises.map(e => {
        if (e.id === exId1) return { ...e, supersetWith: exId2 };
        if (e.id === exId2) return { ...e, supersetWith: exId1 };
        // Unpair anything that was previously paired to either
        if (e.supersetWith === exId1 || e.supersetWith === exId2) return { ...e, supersetWith: null };
        return e;
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    case "UNPAIR_SUPERSET": {
      const { dateKey, exId } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const partnerId = day.exercises.find(e => e.id === exId)?.supersetWith;
      const exs = day.exercises.map(e => {
        if (e.id === exId || e.id === partnerId) return { ...e, supersetWith: null };
        return e;
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    // Update a single set
    case "UPDATE_SET": {
      const { dateKey, exId, setIdx, field, value } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const exs = day.exercises.map(e => {
        if (e.id !== exId) return e;
        const sets = e.sets.map((st, i) => i === setIdx ? { ...st, [field]: value } : st);
        return { ...e, sets };
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    case "TOGGLE_SET_DONE": {
      const { dateKey, exId, setIdx } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const exs = day.exercises.map(e => {
        if (e.id !== exId) return e;
        const sets = e.sets.map((st, i) => {
          if (i !== setIdx) return st;
          if (!st.done) {
            // Checking ON — auto-fill from previous set if empty
            let weight = st.weight;
            let reps = st.reps;
            if (!weight || !reps) {
              // Look backwards for the most recent filled set
              for (let p = setIdx - 1; p >= 0; p--) {
                const prev = e.sets[p];
                if (!weight && prev.weight) weight = prev.weight;
                if (!reps && prev.reps) reps = prev.reps;
                if (weight && reps) break;
              }
            }
            return { ...st, weight: weight || st.weight, reps: reps || st.reps, done: true, skipped: false };
          }
          return { ...st, done: false };
        });
        return { ...e, sets };
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }
    case "SKIP_SET": {
      const { dateKey, exId, setIdx } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const exs = day.exercises.map(e => {
        if (e.id !== exId) return e;
        const sets = e.sets.map((st, i) => i === setIdx ? { ...st, skipped: !st.skipped, done: false } : st);
        return { ...e, sets };
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    case "ADD_SET": {
      const { dateKey, exId } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const exs = day.exercises.map(e => {
        if (e.id !== exId) return e;
        return { ...e, sets: [...e.sets, e.isCardio ? { duration: "", done: false } : { weight: "", reps: "", done: false }] };
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }
    case "DELETE_SET": {
      const { dateKey, exId, setIdx } = a.payload;
      const day = s.workouts[dateKey];
      if (!day) return s;
      const exs = day.exercises.map(e => {
        if (e.id !== exId) return e;
        if (e.sets.length <= 1) return e; // keep at least 1 set
        return { ...e, sets: e.sets.filter((_, i) => i !== setIdx) };
      });
      return { ...s, workouts: { ...s.workouts, [dateKey]: { ...day, exercises: exs } } };
    }

    default: return s;
  }
}

function usePersisted() {
  const [s, d] = useReducer(reducer, init, (i) => {
    try {
      const raw = localStorage.getItem("se_v13");
      if (raw) {
        const p = JSON.parse(raw);
        const progs = p.programs && p.programs.length > 0 ? p.programs : DEFAULT_PROGRAMS;
        let scheds = p.schedules || {};
        if (!p.schedules && p.schedule) scheds = {};
        const ws = p.weekStart || "saturday";
        W = WEEK_STARTS[ws] ?? 6;
        // Migrate old flat meals to grouped meal structure
        let nutri = p.nutrition || {};
        Object.keys(nutri).forEach(dk => {
          const day = nutri[dk];
          if (day?.meals?.length > 0 && !day.meals[0].items) {
            // Old format: meals are flat food items. Wrap them in a single "Meal" group.
            nutri = { ...nutri, [dk]: { meals: [{ id: 1, name: "Meal", items: day.meals }] } };
          }
        });
        return { ...i, programs: progs, schedules: scheds, workouts: p.workouts || {}, theme: p.theme || "dark", units: p.units || "lbs", weekStart: ws, restDefault: p.restDefault || 90, accentColor: p.accentColor || null, logoChoice: p.logoChoice || "logo1", appTitle: p.appTitle || "LIFE – Fitness", favorites: p.favorites || [], nutrition: nutri, nutritionFavs: p.nutritionFavs || [], macroGoals: p.macroGoals || { calories: 2500, protein: 180, carbs: 250, fat: 80 }, timerAutoStart: p.timerAutoStart === true, exerciseFavs: p.exerciseFavs || [] };
      }
    } catch {} return i;
  });
  useEffect(() => {
    try { localStorage.setItem("se_v13", JSON.stringify({ programs: s.programs, schedules: s.schedules, workouts: s.workouts, theme: s.theme, units: s.units, weekStart: s.weekStart, restDefault: s.restDefault, accentColor: s.accentColor, logoChoice: s.logoChoice, appTitle: s.appTitle, favorites: s.favorites, nutrition: s.nutrition, nutritionFavs: s.nutritionFavs, macroGoals: s.macroGoals, timerAutoStart: s.timerAutoStart, exerciseFavs: s.exerciseFavs })); } catch {}
  }, [s.programs, s.schedules, s.workouts, s.theme, s.units, s.weekStart, s.restDefault, s.accentColor, s.logoChoice, s.appTitle, s.favorites, s.nutrition, s.nutritionFavs, s.macroGoals, s.timerAutoStart, s.exerciseFavs]);
  return [s, d];
}

        <div style={{ display:"flex", flexDirection:"column", gap:2, padding:"0 6px", flexShrink:0 }}>

              <div style={{ width:80, fontSize:10, fontWeight:700, color:C.textMuted, textAlign:"center", flexShrink:0 }}>{"WEIGHT (" + U + ")"}</div>

          </div>

            <SetRow key={i} set={set} idx={i} isCardio={ex.isCardio} exId={ex.id} dateKey={dateKey} dispatch={dispatch} totalSets={ex.sets.length} />

          <div style={{ display:"flex", gap:8, marginTop:4, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", borderRadius:8, border:`1px solid ${C.border}`, overflow:"hidden", flex:1, minWidth:80 }}>
              <button onClick={() => { if (ex.sets.length > 1) dispatch({ type:"DELETE_SET", payload:{ dateKey, exId:ex.id, setIdx:ex.sets.length-1 }}); }} disabled={ex.sets.length <= 1} style={{
                padding:"10px 14px", background:"transparent", border:"none", borderRight:`1px solid ${C.border}`,

              }}><LinkIco s={12}/> Superset</button>

            <button onClick={() => dispatch({ type:"DELETE_EXERCISE", payload:{ dateKey, exId:ex.id }})} style={{
              padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent",
              color:C.danger, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", gap:4,

          {/* Pair picker */}

            <div style={{ background:C.bg, borderRadius:10, padding:10, border:`1px solid ${C.border}`, display:"flex", flexDirection:"column", gap:4 }}>

                <button key={p.id} onClick={() => { onPair(ex.id, p.id); setShowPairPicker(false); }} style={{
                  width:"100%", padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:C.card,
                  color:C.text, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit", textAlign:"left",
                  display:"flex", alignItems:"center", gap:8,
                }}>
                  <Badge muscle={p.muscle} small />{p.name}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// --- Superset Log (alternating sets) ---

function SupersetLog({ exA, exB, dateKey, dispatch, isFirst, isLast }) {
  const [open, setOpen] = useState(false);
  const allSets = [...exA.sets, ...exB.sets];
  const doneSets = allSets.filter(s => s.done).length;
  const totalSets = allSets.length;
  const allDone = totalSets > 0 && doneSets === totalSets;

  // Build alternating rows: set 1 of A, set 1 of B, set 2 of A, set 2 of B, ...
  const maxSets = Math.max(exA.sets.length, exB.sets.length);
  const rows = [];
  for (let i = 0; i < maxSets; i++) {
    if (i < exA.sets.length) rows.push({ ex: exA, setIdx: i, setNum: i + 1 });
    if (i < exB.sets.length) rows.push({ ex: exB, setIdx: i, setNum: i + 1 });
  }

  const colorA = mColor[exA.muscle] || C.accent;
  const colorB = mColor[exB.muscle] || C.accent;

  const moveBtn = {
    background:"none", border:`1px solid ${C.accent}40`, borderRadius:8, width:30, height:30,
    display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:C.textDim, flexShrink:0, padding:0,
  };

  return (
    <div style={{
      borderRadius:16, border:`1.5px solid ${C.accent}40`, overflow:"hidden",
      background:`linear-gradient(135deg, ${C.accentDim}, transparent)`,
    }}>
      <div style={{ display:"flex", alignItems:"center", padding:"10px 10px 10px 0" }}>
        <div style={{ display:"flex", flexDirection:"column", gap:2, padding:"0 6px", flexShrink:0 }}>
          <button onClick={(e)=>{e.stopPropagation();dispatch({type:"MOVE_EXERCISE",payload:{dateKey,exId:exA.id,direction:-1}});}} disabled={isFirst} style={{ ...moveBtn, opacity:isFirst?0.3:1 }}><ArrowUp s={12}/></button>
          <button onClick={(e)=>{e.stopPropagation();dispatch({type:"MOVE_EXERCISE",payload:{dateKey,exId:exA.id,direction:1}});}} disabled={isLast} style={{ ...moveBtn, opacity:isLast?0.3:1 }}><ArrowDown s={12}/></button>
        </div>
        <button onClick={() => setOpen(!open)} style={{
          flex:1, background:"none", border:"none", cursor:"pointer", padding:"4px 6px 4px 4px",
          display:"flex", alignItems:"center", justifyContent:"space-between", fontFamily:"inherit",
        }}>
        <div style={{ textAlign:"left" }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
            <LinkIco s={12}/>
            <span style={{ fontSize:11, fontWeight:700, color:C.accent, textTransform:"uppercase", letterSpacing:"0.06em" }}>Superset</span>
          </div>
          <div style={{ fontSize:15, fontWeight:700, color: allDone ? C.success : C.text }}>
            {exA.name} <span style={{ color:C.textMuted, fontWeight:400, fontSize:13 }}>&</span> {exB.name}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:3 }}>
            <Badge muscle={exA.muscle} small />
            <Badge muscle={exB.muscle} small />
            <span style={{ fontSize:11, color:C.textMuted }}>{doneSets}/{totalSets} sets</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {allDone && <Check s={14}/>}
          <ChevDown open={open}/>
        </div>
      </button>
      </div>

      {open && (
        <div style={{ padding:"0 12px 14px", display:"flex", flexDirection:"column", gap:6 }}>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"0 2px 2px" }}>
            <div style={{ width:28 }}/>
            <div style={{ width:60, fontSize:10, fontWeight:700, color:C.textMuted, flexShrink:0 }}>EXERCISE</div>
            <div style={{ flex:1, fontSize:10, fontWeight:700, color:C.textMuted }}>{"WEIGHT (" + U + ")"}</div>
            <div style={{ width:52, fontSize:10, fontWeight:700, color:C.textMuted }}>REPS</div>
            <div style={{ width:36 }}/>
          </div>

          {rows.map((row, i) => {
            const isA = row.ex.id === exA.id;
            const set = row.ex.sets[row.setIdx];
            const exColor = isA ? colorA : colorB;
            const done = set.done;

            return (
              <div key={`${row.ex.id}-${row.setIdx}`} style={{
                display:"flex", alignItems:"center", gap:8,
                background: isA ? `${colorA}0a` : `${colorB}0a`,
                borderRadius:8, padding:"2px 2px 2px 0",
              }}>
                <div style={{ width:3, height:36, borderRadius:2, background:exColor, flexShrink:0 }}/>
                <div style={{ width:24, fontSize:12, fontWeight:700, color:C.textMuted, textAlign:"center", flexShrink:0 }}>{row.setNum}</div>
                <div style={{ width:56, fontSize:11, fontWeight:600, color:exColor, flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {isA ? exA.name.split(" ")[0] : exB.name.split(" ")[0]}
                </div>
                {row.ex.isCardio ? (
                  <input style={{ ...getInpSm(), flex:1 }} placeholder="Duration" value={set.duration||""} onChange={e => dispatch({ type:"UPDATE_SET", payload:{ dateKey, exId:row.ex.id, setIdx:row.setIdx, field:"duration", value:e.target.value }})} />
                ) : (<>
                  <input style={{ ...getInpSm(), width:68, flexShrink:0, textAlign:"center" }} placeholder={U} inputMode="decimal" value={set.weight||""} onChange={e => dispatch({ type:"UPDATE_SET", payload:{ dateKey, exId:row.ex.id, setIdx:row.setIdx, field:"weight", value:e.target.value }})} />
                  <input style={{ ...getInpSm(), width:44, flexShrink:0, textAlign:"center" }} placeholder="reps" inputMode="numeric" value={set.reps||""} onChange={e => dispatch({ type:"UPDATE_SET", payload:{ dateKey, exId:row.ex.id, setIdx:row.setIdx, field:"reps", value:e.target.value }})} />
                </>)}
                <button onClick={() => dispatch({ type:"TOGGLE_SET_DONE", payload:{ dateKey, exId:row.ex.id, setIdx:row.setIdx }})} style={{
                  width:32, height:32, borderRadius:8, border: done ? `1.5px solid ${C.success}` : `1px solid ${C.border}`,
                  background: done ? C.successDim : "transparent", display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:"pointer", flexShrink:0, color: done ? C.success : C.textMuted,
                }}><Check s={12}/></button>
              </div>
            );
          })}

          <div style={{ display:"flex", gap:8, marginTop:4, flexWrap:"wrap" }}>
            <button onClick={() => dispatch({ type:"ADD_SET", payload:{ dateKey, exId:exA.id }})} style={{
              flex:1, minWidth:70, padding:"10px", borderRadius:8, border:`1px dashed ${C.border}`, background:"transparent",
              color:colorA, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
            }}>+ {exA.name.split(" ")[0]}</button>
            <button onClick={() => dispatch({ type:"ADD_SET", payload:{ dateKey, exId:exB.id }})} style={{
              flex:1, minWidth:70, padding:"10px", borderRadius:8, border:`1px dashed ${C.border}`, background:"transparent",
              color:colorB, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
            }}>+ {exB.name.split(" ")[0]}</button>
            <button onClick={() => dispatch({ type:"UNPAIR_SUPERSET", payload:{ dateKey, exId:exA.id }})} style={{
              padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent",
              color:C.textMuted, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", gap:4,
            }}><UnlinkIco s={12}/> Unpair</button>
          </div>
        </div>
      )}
    </div>
  );
}

// --- Day Nutrition (inline in DayRow) ---
function DayNutrition({ dateKey, nutrition, nutritionFavs, macroGoals, dispatch }) {
  const [expandedMeal, setExpandedMeal] = useState(null);
  const [nutritionOpen, setNutritionOpen] = useState(false);
  const [addingTo, setAddingTo] = useState(null);
  const [showFavs, setShowFavs] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [showNewMeal, setShowNewMeal] = useState(false);
  const [newMealName, setNewMealName] = useState("");
  const [confirmDeleteMeal, setConfirmDeleteMeal] = useState(null);
  const [saveFeedback, setSaveFeedback] = useState(false);
  const [fName, setFName] = useState("");
  const [fQty, setFQty] = useState("1");
  const [fPro, setFPro] = useState("");
  const [fCarb, setFCarb] = useState("");
  const [fFat, setFFat] = useState("");

  const meals = nutrition[dateKey]?.meals || [];
  const goals = macroGoals || { calories: 2500, protein: 180, carbs: 250, fat: 80 };
  const favs = nutritionFavs || [];

  // Day totals across all meals
  const totals = meals.reduce((acc, meal) => {
    (meal.items || []).forEach(item => {
      acc.calories += parseFloat(item.calories) || 0;
      acc.protein += parseFloat(item.protein) || 0;
      acc.carbs += parseFloat(item.carbs) || 0;
      acc.fat += parseFloat(item.fat) || 0;
    });
    return acc;
  }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const calcCal = () => {
    const q = parseFloat(fQty) || 1;
    return ((parseFloat(fPro)||0) * 4 + (parseFloat(fCarb)||0) * 4 + (parseFloat(fFat)||0) * 9) * q;
  };
  const clearForm = () => { setFName(""); setFQty("1"); setFPro(""); setFCarb(""); setFFat(""); setEditingItem(null); };

  const submitFood = (mealId) => {
    if (!fName.trim() && !fPro && !fCarb && !fFat) return;
    const q = parseFloat(fQty) || 1;
    const pro = String(Math.round((parseFloat(fPro)||0) * q));
    const carb = String(Math.round((parseFloat(fCarb)||0) * q));
    const fat = String(Math.round((parseFloat(fFat)||0) * q));
    const cal = (parseFloat(pro)||0) * 4 + (parseFloat(carb)||0) * 4 + (parseFloat(fat)||0) * 9;
    const displayName = q !== 1 ? `${fName.trim() || "Food"} (×${q})` : (fName.trim() || "Food");
    if (editingItem && editingItem.mealId === mealId) {
      dispatch({ type: "EDIT_FOOD_ITEM", payload: { dateKey, mealId, itemId: editingItem.itemId, updated: { name: displayName, calories: cal, protein: pro, carbs: carb, fat: fat } } });
    } else {
      dispatch({ type: "ADD_FOOD_ITEM", payload: { dateKey, mealId, item: { name: displayName, calories: cal, protein: pro, carbs: carb, fat: fat } } });
    }
    clearForm();
    setAddingTo(null);
  };

  const startEditItem = (mealId, item) => {
    setFName(item.name || ""); setFQty("1"); setFPro(item.protein || ""); setFCarb(item.carbs || ""); setFFat(item.fat || "");
    setEditingItem({ mealId, itemId: item.id });
    setAddingTo(mealId);
    setShowFavs(null);
  };

  const addFromFav = (mealId, fav) => {
    const cal = (parseFloat(fav.protein)||0) * 4 + (parseFloat(fav.carbs)||0) * 4 + (parseFloat(fav.fat)||0) * 9;
    dispatch({ type: "ADD_FOOD_ITEM", payload: { dateKey, mealId, item: { ...fav, calories: cal } } });
  };

  const saveAsFav = () => {
    if (!fName.trim()) return;
    // Save the per-unit macros (not multiplied) so favs are reusable
    dispatch({ type: "ADD_NUTRITION_FAV", payload: { name: fName.trim(), calories: ((parseFloat(fPro)||0)*4 + (parseFloat(fCarb)||0)*4 + (parseFloat(fFat)||0)*9), protein: fPro, carbs: fCarb, fat: fFat } });
    setSaveFeedback(true);
    setTimeout(() => setSaveFeedback(false), 1500);
  };

  // Autocomplete suggestions from favorites based on food name input
  const suggestions = fName.trim().length >= 2
    ? favs.filter(f => f.name.toLowerCase().includes(fName.toLowerCase()) && f.name.toLowerCase() !== fName.toLowerCase()).slice(0, 4)
    : [];

  const pickSuggestion = (fav) => {
    setFName(fav.name);
    setFQty("1");
    setFPro(fav.protein || "");
    setFCarb(fav.carbs || "");
    setFFat(fav.fat || "");
  };

  const addNewMeal = () => {
    if (!newMealName.trim()) return;
    dispatch({ type: "ADD_MEAL", payload: { dateKey, mealName: newMealName.trim() } });
    setNewMealName("");
    setShowNewMeal(false);
  };

  // Mini progress bar
  const MiniBar = ({ current, goal, color }) => {
    const pct = goal > 0 ? Math.min((current / goal) * 100, 100) : 0;
    return (
      <div style={{ flex: 1 }}>
        <div style={{ height: 4, borderRadius: 2, background: C.border, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 2, width: `${pct}%`, background: current > goal ? "#ef4444" : color, transition: "width 0.3s" }} />
        </div>
        <div style={{ fontSize: 9, color: C.textMuted, marginTop: 2, textAlign: "center" }}>{Math.round(current)}/{goal}</div>
      </div>
    );
  };

  // Meal totals
  const mealTotals = (meal) => (meal.items || []).reduce((acc, i) => ({
    calories: acc.calories + (parseFloat(i.calories) || 0),
    protein: acc.protein + (parseFloat(i.protein) || 0),
    carbs: acc.carbs + (parseFloat(i.carbs) || 0),
    fat: acc.fat + (parseFloat(i.fat) || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  return (
    <div>
      {/* Divider */}
      <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${C.border}, transparent)`, marginBottom: 8 }} />
      
      {/* Collapsible header */}
      <button onClick={() => setNutritionOpen(!nutritionOpen)} style={{
        width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10,
        padding: "8px 12px", cursor: "pointer", fontFamily: "inherit",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span style={{ color: "#22c55e" }}><NutritionIco /></span>
        <span style={{ fontSize: 12, fontWeight: 700, color: "#22c55e", textTransform: "uppercase", letterSpacing: "0.06em" }}>Nutrition</span>
        <div style={{ flex: 1, display: "flex", gap: 4, marginLeft: 4 }}>
          {[
            { label: "cal", current: totals.calories, goal: goals.calories, color: C.accent },
            { label: "p", current: totals.protein, goal: goals.protein, color: "#22c55e" },
            { label: "c", current: totals.carbs, goal: goals.carbs, color: "#eab308" },
            { label: "f", current: totals.fat, goal: goals.fat, color: "#f97316" },
          ].map(({ label, current, goal, color }) => (
            <div key={label} style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, marginBottom: 2 }}>{label}</div>
              <MiniBar current={current} goal={goal} color={color} />
            </div>
          ))}
        </div>
        <ChevDown open={nutritionOpen} />
      </button>

      {/* Collapsible content */}
      {nutritionOpen && (
      <div style={{ marginTop: 8 }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
        {meals.map((meal, mi) => {
          const mt = mealTotals(meal);
          const isOpen = expandedMeal === meal.id;
          const itemCount = (meal.items || []).length;
          return (
            <div key={meal.id} style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
              {/* Meal header */}
              <div style={{ display: "flex", alignItems: "center" }}>
                {meals.length > 1 && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 1, padding: "0 4px", flexShrink: 0 }}>
                    <button onClick={() => dispatch({ type: "MOVE_MEAL", payload: { dateKey, mealId: meal.id, direction: -1 } })} disabled={mi === 0} style={{ background: "none", border: "none", cursor: "pointer", padding: "1px 2px", color: C.textMuted, opacity: mi === 0 ? 0.3 : 1 }}><ArrowUp s={8}/></button>
                    <button onClick={() => dispatch({ type: "MOVE_MEAL", payload: { dateKey, mealId: meal.id, direction: 1 } })} disabled={mi === meals.length - 1} style={{ background: "none", border: "none", cursor: "pointer", padding: "1px 2px", color: C.textMuted, opacity: mi === meals.length - 1 ? 0.3 : 1 }}><ArrowDown s={8}/></button>
                  </div>
                )}
                <button onClick={() => setExpandedMeal(isOpen ? null : meal.id)} style={{
                  flex: 1, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", textAlign: "left",
                  padding: "8px 8px 8px 6px", display: "flex", alignItems: "center", justifyContent: "space-between",
                }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{meal.name}</div>
                    <div style={{ fontSize: 10, color: C.textMuted }}>{itemCount} item{itemCount !== 1 ? "s" : ""} · {Math.round(mt.calories)} cal · {Math.round(mt.protein)}p</div>
                  </div>
                  <ChevDown open={isOpen}/>
                </button>
                {confirmDeleteMeal === meal.id ? (
                  <div style={{ display: "flex", gap: 4, flexShrink: 0, padding: "4px" }}>

                )}

                    <div style={{ display: "flex", flexDirection: "column", gap: 3, marginTop: 6 }}>
                      {(meal.items || []).map((item, ii) => (

                          {(meal.items || []).length > 1 && (
                            <div style={{ display: "flex", flexDirection: "column", gap: 0, flexShrink: 0 }}>
                              <button onClick={() => dispatch({ type: "MOVE_FOOD_ITEM", payload: { dateKey, mealId: meal.id, itemId: item.id, direction: -1 } })} disabled={ii === 0} style={{ background: "none", border: "none", cursor: "pointer", padding: "0 2px", color: C.textMuted, opacity: ii === 0 ? 0.3 : 1 }}><ArrowUp s={7}/></button>
                              <button onClick={() => dispatch({ type: "MOVE_FOOD_ITEM", payload: { dateKey, mealId: meal.id, itemId: item.id, direction: 1 } })} disabled={ii === (meal.items||[]).length - 1} style={{ background: "none", border: "none", cursor: "pointer", padding: "0 2px", color: C.textMuted, opacity: ii === (meal.items||[]).length - 1 ? 0.3 : 1 }}><ArrowDown s={7}/></button>
                            </div>
                          )}
                          <button onClick={() => startEditItem(meal.id, item)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", textAlign: "left", padding: 0, minWidth: 0 }}>
                            <div style={{ fontSize: 11, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</div>
                            <div style={{ fontSize: 9, color: C.textMuted }}>{Math.round(item.calories || 0)} cal · {item.protein || 0}p · {item.carbs || 0}c · {item.fat || 0}f</div>
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); dispatch({ type: "DELETE_FOOD_ITEM", payload: { dateKey, mealId: meal.id, itemId: item.id } }); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, padding: 6, flexShrink: 0, minWidth: 28, minHeight: 28, display: "flex", alignItems: "center", justifyContent: "center" }}><X s={12}/></button>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Add food / Favs buttons */}
                  <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
                    <button onClick={() => { if (addingTo === meal.id && !editingItem) { setAddingTo(null); } else { clearForm(); setAddingTo(meal.id); } setShowFavs(null); }} style={{
                      flex: 1, padding: "6px 0", borderRadius: 6, border: `1px dashed ${C.border}`, background: addingTo === meal.id ? C.accentDim : "transparent",
                      color: addingTo === meal.id ? C.accent : C.textDim, fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                      display: "flex", alignItems: "center", justifyContent: "center", gap: 3,
                    }}>{editingItem?.mealId === meal.id ? <><X s={8}/> Cancel</> : <><Plus s={8}/> Food</>}</button>
                    {favs.length > 0 && (
                      <button onClick={() => { setShowFavs(showFavs === meal.id ? null : meal.id); setAddingTo(null); clearForm(); }} style={{
                        padding: "6px 8px", borderRadius: 6, border: `1px solid ${C.border}`, background: showFavs === meal.id ? C.accentDim : "transparent",
                        color: showFavs === meal.id ? C.accent : C.textDim, fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                        display: "flex", alignItems: "center", gap: 3,
                      }}><StarIco filled={true} s={8}/> Favs</button>
                    )}
                  </div>

                  {/* Add food form */}
                  {addingTo === meal.id && (
                    <div style={{ background: C.card, borderRadius: 8, padding: "8px", border: `1px solid ${C.border}`, marginTop: 6 }}>
                      <input style={{ ...getInp(), width: "100%", fontSize: 12, padding: "7px 9px", marginBottom: suggestions.length > 0 ? 0 : 5 }} placeholder="Food name" value={fName} onChange={e => setFName(e.target.value)} />
                      {/* Autocomplete suggestions */}
                      {suggestions.length > 0 && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 3, padding: "4px 0 5px" }}>
                          {suggestions.map((fav, si) => (
                            <button key={si} onClick={() => pickSuggestion(fav)} style={{
                              padding: "3px 8px", borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface,
                              cursor: "pointer", fontFamily: "inherit", fontSize: 10, fontWeight: 600, color: C.accent,
                            }}>{fav.name}</button>
                          ))}
                        </div>
                      )}
                      <div style={{ display: "flex", gap: 4, alignItems: "center", marginBottom: 4 }}>
                        <span style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, flexShrink: 0 }}>Qty</span>
                        <input style={{ ...getInp(), width: 44, fontSize: 12, padding: "7px", textAlign: "center" }} inputMode="decimal" value={fQty} onChange={e => setFQty(e.target.value)} />
                        <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4 }}>
                          <input style={{ ...getInp(), fontSize: 12, padding: "7px" }} placeholder="Protein" inputMode="numeric" value={fPro} onChange={e => setFPro(e.target.value)} />
                          <input style={{ ...getInp(), fontSize: 12, padding: "7px" }} placeholder="Carbs" inputMode="numeric" value={fCarb} onChange={e => setFCarb(e.target.value)} />
                          <input style={{ ...getInp(), fontSize: 12, padding: "7px" }} placeholder="Fat" inputMode="numeric" value={fFat} onChange={e => setFFat(e.target.value)} />
                        </div>
                      </div>
                      <div style={{ fontSize: 9, color: C.textMuted, marginBottom: 4, textAlign: "center" }}>
                        {parseFloat(fQty) > 1 ? `${parseFloat(fQty)} × (${Math.round(((parseFloat(fPro)||0)*4+(parseFloat(fCarb)||0)*4+(parseFloat(fFat)||0)*9))} cal) = ` : "= "}{Math.round(calcCal())} cal

                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => submitFood(meal.id)} style={{ flex: 1, padding: "7px", borderRadius: 6, border: "none", background: C.accent, color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{editingItem ? "Save" : "Add"}</button>
                        {!editingItem && <button onClick={saveAsFav} style={{
                          padding: "7px 8px", borderRadius: 6, border: `1px solid ${saveFeedback ? "#22c55e" : C.border}`,
                          background: saveFeedback ? "#22c55e20" : "transparent",
                          color: saveFeedback ? "#22c55e" : "#eab308",
                          fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                          display: "flex", alignItems: "center", gap: 2, transition: "all 0.2s",
                        }}><StarIco filled={saveFeedback} s={8}/> {saveFeedback ? "Saved!" : "Fav"}</button>}
                      </div>

                  {/* Favorites for this meal */}
                  {showFavs === meal.id && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 3, marginTop: 6 }}>

        })}
      </div>

      {/* Add new meal group */}

          <button onClick={() => { setShowNewMeal(false); setNewMealName(""); }} style={{ padding: "8px", borderRadius: 8, border: `1px solid ${C.border}`, background: "transparent", color: C.textMuted, cursor: "pointer" }}><X s={10}/></button>
        </div>
      ) : (
        <button onClick={() => setShowNewMeal(true)} style={{
          width: "100%", padding: "8px 0", borderRadius: 8, border: `1px dashed ${C.border}`, background: "transparent",
          color: C.textDim, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",

}


function DayRow({ dayLbl, date, dateKey, workout, programDayName, activeProgramName, isToday, isExpanded, dispatch, hasPrograms, allWorkouts, nutrition, nutritionFavs, macroGoals }) {
  const exercises = workout?.exercises || [];
  const isRest = workout?.isRest || false;
  const totalSets = exercises.reduce((a, e) => a + e.sets.length, 0);
  const doneSets = exercises.reduce((a, e) => a + e.sets.filter(s => s.done).length, 0);
  const hasWorkout = exercises.length > 0;
  const allDone = hasWorkout && doneSets === totalSets;
  const pct = totalSets > 0 ? (doneSets / totalSets) * 100 : 0;

  const hasStrength = exercises.some(e => !e.isCardio);
  const [confirmClearDay, setConfirmClearDay] = useState(false);
  const [workoutOpen, setWorkoutOpen] = useState(false);
  const [notesOpen, setNotesOpen] = useState(false);

  // Compute last-time weights for each exercise name
  const lastWeights = {};
  if (allWorkouts) {
    const sortedDates = Object.keys(allWorkouts).filter(dk => dk < dateKey).sort().reverse();
    for (const dk of sortedDates) {
      const day = allWorkouts[dk];
      if (!day?.exercises) continue;
      for (const ex of day.exercises) {
        if (lastWeights[ex.name]) continue;
        const done = ex.sets?.filter(st => st.done && st.weight);
        if (done && done.length > 0) {
          const bestSet = done.reduce((best, st) => (parseFloat(st.weight)||0) > (parseFloat(best.weight)||0) ? st : best, done[0]);
          lastWeights[ex.name] = { weight: bestSet.weight, reps: bestSet.reps };
        }
      }
      if (exercises.every(ex => lastWeights[ex.name])) break; // found all, stop searching
    }
  }

  return (
    <div style={{
      background: isToday ? C.accentDim : "transparent", borderRadius:16, overflow:"hidden",
      border: isToday ? `1.5px solid ${C.accent}` : `1px solid ${C.border}`,
    }}>
      <button onClick={() => dispatch({ type:"TOGGLE_DAY", payload:dateKey })} style={{
        width:"100%", background:"none", border:"none", cursor:"pointer", padding:"12px 14px",
        display:"flex", alignItems:"center", justifyContent:"space-between", fontFamily:"inherit", color:C.text,
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, flex:1, minWidth:0 }}>
          <div style={{
            width:46, height:46, borderRadius:12, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flexShrink:0,
            background: isToday ? C.accent : C.card, border: isToday ? `1.5px solid ${C.accent}` : `1px solid ${C.border}`,
          }}>
            <span style={{ fontSize:10, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.08em", color: isToday ? "#fff" : C.textMuted, lineHeight:1 }}>{dayLbl}</span>
            <span style={{ fontSize:18, fontWeight:800, color: isToday ? "#fff" : C.textDim, lineHeight:1.2 }}>{date.getDate()}</span>
          </div>
          <div style={{ flex:1, minWidth:0, display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
            <div style={{ minWidth:0 }}>
              {isRest ? (
                <div style={{ fontSize:15, fontWeight:700, color:C.textMuted }}>
                  {programDayName ? `${programDayName} — Rest` : "Rest day"}
                </div>
              ) : exercises.length > 0 ? (
                <div style={{ fontSize:14, fontWeight:700, color: allDone ? C.success : C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {[...new Set(exercises.map(e => e.muscle).filter(Boolean))].join(" / ")}
                </div>
              ) : (
                <div style={{ fontSize:15, fontWeight:700, color:C.textMuted }}>Rest day</div>
              )}
            </div>
          </div>
        </div>
        <div style={{ flexShrink:0, marginLeft:8 }}><ChevDown open={isExpanded}/></div>
      </button>

      {isExpanded && (
        <div style={{ padding:"0 14px 14px", display:"flex", flexDirection:"column", gap: 8 }}>

          {/* Workout collapsible */}
          <div>
            <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${C.border}, transparent)`, marginBottom: 8 }} />
            <button onClick={() => setWorkoutOpen(!workoutOpen)} style={{
              width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10,
              padding: "8px 12px", cursor: "pointer", fontFamily: "inherit",
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <span style={{ color: C.accent }}><DumbbellTab /></span>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: "0.06em" }}>Workout</span>
              <span style={{ fontSize: 11, color: C.textMuted, marginLeft: "auto" }}>
                {exercises.length > 0 ? `${doneSets}/${totalSets} sets` : isRest ? "Rest" : "Empty"}
              </span>
              <ChevDown open={workoutOpen} />
            </button>

            {workoutOpen && (
              <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
            <>
              {!isRest && (() => {
                const rendered = new Set();
                const items = [];
                const handlePair = (id1, id2) => dispatch({ type:"PAIR_SUPERSET", payload:{ dateKey, exId1:id1, exId2:id2 }});

                exercises.forEach(ex => {
                  if (rendered.has(ex.id)) return;
                  rendered.add(ex.id);

                  if (ex.supersetWith) {
                    const partner = exercises.find(e => e.id === ex.supersetWith);
                    if (partner && !rendered.has(partner.id)) {
                      rendered.add(partner.id);
                      items.push({ type:"superset", exA:ex, exB:partner });
                      return;
                    }
                  }
                  const available = exercises.filter(e => e.id !== ex.id && !e.supersetWith);
                  items.push({ type:"single", ex, available });
                });

                return items.map((item, idx) => {
                  const isFirst = idx === 0;
                  const isLast = idx === items.length - 1;
                  if (item.type === "superset") {
                    return <SupersetLog key={`ss-${item.exA.id}`} exA={item.exA} exB={item.exB} dateKey={dateKey} dispatch={dispatch} isFirst={isFirst} isLast={isLast} lastWeights={lastWeights} />;
                  }
                  return <ExerciseLog key={item.ex.id} ex={item.ex} dateKey={dateKey} dispatch={dispatch}
                    isPaired={false} onPair={handlePair} availablePartners={item.available} isFirst={isFirst} isLast={isLast} lastWeight={lastWeights[item.ex.name]} />;
                });
              })()}
              {isRest && <div style={{ padding:"12px 0", textAlign:"center", fontSize:13, color:C.textMuted, fontStyle:"italic" }}>Rest day — no exercises</div>}

              <div style={{ display:"flex", gap:8 }}>
                {!isRest && (
                  <button onClick={() => dispatch({ type:"OPEN_MODAL", payload:{ modal:"addExercise", day:dateKey }})} style={{
                    flex:1, padding:"14px 0", borderRadius:12, border:`1.5px dashed ${C.border}`, background:"transparent",
                    color:C.textDim, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
                    display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                  }}><Plus s={14}/> Add Exercise</button>
                )}
                {hasPrograms && (
                  <button onClick={() => dispatch({ type:"OPEN_MODAL", payload:{ modal:"assignDay", day:dateKey }})} style={{
                    flex:1, padding:"14px 0", borderRadius:12, border:`1px solid ${C.border}`, background:C.card,
                    color:C.accent, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
                    display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                  }}><ListIco /> {hasWorkout || isRest ? "Change" : "From Program"}</button>
                )}
              </div>
              {hasWorkout && !confirmClearDay && (
                <button onClick={() => setConfirmClearDay(true)} style={{
                  width:"100%", padding:"10px 0", borderRadius:10, border:`1px solid ${C.border}`, background:"transparent",
                  color:C.textMuted, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
                  display:"flex", alignItems:"center", justifyContent:"center", gap:5, marginTop:4,
                }}><X s={11}/> Clear Day</button>
              )}
              {confirmClearDay && (
                <div style={{ display:"flex", gap:8, marginTop:4 }}>
                  <button onClick={() => { dispatch({ type:"CLEAR_DAY", payload: dateKey }); setConfirmClearDay(false); }} style={{
                    flex:1, padding:"10px 0", borderRadius:10, border:"none", background:"#ef4444",
                    color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
                  }}>Clear All Exercises</button>
                  <button onClick={() => setConfirmClearDay(false)} style={{
                    padding:"10px 16px", borderRadius:10, border:`1px solid ${C.border}`, background:C.card,
                    color:C.textMuted, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
                  }}>Cancel</button>
                </div>
              )}
            </>
              </div>
            )}
          </div>

          {/* Day Nutrition */}
          <DayNutrition dateKey={dateKey} nutrition={nutrition} nutritionFavs={nutritionFavs} macroGoals={macroGoals} dispatch={dispatch} />

          {/* Day Notes */}
          <div>
            <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${C.border}, transparent)`, marginBottom: 8 }} />
            <button onClick={() => setNotesOpen(!notesOpen)} style={{
              width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10,
              padding: "8px 12px", cursor: "pointer", fontFamily: "inherit",
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <span style={{ color: "#eab308" }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
              <span style={{ fontSize: 12, fontWeight: 700, color: "#eab308", textTransform: "uppercase", letterSpacing: "0.06em" }}>Notes</span>
              {workout?.notes && <span style={{ fontSize: 11, color: C.textMuted, marginLeft: "auto", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 150 }}>{workout.notes}</span>}
              <ChevDown open={notesOpen} />
            </button>
            {notesOpen && (
              <div style={{ marginTop: 8 }}>
                <textarea
                  id={`day-notes-${dateKey}`}
                  key={`day-notes-${dateKey}`}
                  defaultValue={workout?.notes || ""}
                  onBlur={e => dispatch({ type: "SET_DAY_NOTES", payload: { dateKey, notes: e.target.value } })}
                  placeholder="How did today's workout feel? Any notes..."
                  style={{ ...getInp(), minHeight: 80, resize: "vertical", fontFamily: "inherit", lineHeight: 1.5, fontSize: 13, padding: "10px 12px" }}
                />
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// --- Add Exercise Modal ---

function AddExerciseModal({ dateKey, dispatch, workouts, programs, exerciseFavs }) {
  const [name, setName] = useState("");
  const [muscle, setMuscle] = useState("Chest");
  const [sets, setSets] = useState("");
  const [reps, setReps] = useState("");
  const [showPrevious, setShowPrevious] = useState(true);
  const [filterMuscle, setFilterMuscle] = useState("All");
  const [showFavsOnly, setShowFavsOnly] = useState(false);
  const [expandedGroup, setExpandedGroup] = useState(null);
  const isCardio = CARDIO_GROUPS.has(muscle);

  // Build list of previously used exercises + all program exercises
  const prevExercises = {};
  // From workout history first (these take priority)
  Object.values(workouts || {}).forEach(day => {
    if (!day.exercises) return;
    day.exercises.forEach(ex => {
      if (!prevExercises[ex.name]) {
        prevExercises[ex.name] = { muscle: ex.muscle, targetSets: ex.targetSets || ex.sets?.length || 3, targetReps: ex.targetReps || "", fromHistory: true };
      }
    });
  });
  // From programs (only add if not already from history)
  (programs || []).forEach(prog => {
    (prog.days || []).forEach(day => {
      if (day.isRest || !day.exercises) return;
      day.exercises.forEach(ex => {
        if (!prevExercises[ex.name]) {
          prevExercises[ex.name] = { muscle: ex.muscle, targetSets: ex.targetSets || "3", targetReps: ex.targetReps || "", fromHistory: false };
        }
      });
    });
  });
  const prevList = Object.entries(prevExercises).sort((a, b) => a[0].localeCompare(b[0]));
  const allMuscles = [...new Set(prevList.map(([_, s]) => s.muscle).filter(Boolean))].sort();
  const eFavs = exerciseFavs || [];
  let prevFiltered = [...prevList];
  if (showFavsOnly) prevFiltered = prevFiltered.filter(([n]) => eFavs.includes(n));
  if (filterMuscle !== "All") prevFiltered = prevFiltered.filter(([_, s]) => s.muscle === filterMuscle);
  if (name.trim()) prevFiltered = prevFiltered.filter(([n]) => n.toLowerCase().includes(name.toLowerCase()));

  const pickPrev = (exName, info) => {
    setName(exName);
    setMuscle(info.muscle || "Chest");
    setSets("");
    setReps("");
    setShowPrevious(false);
  };

  return (
    <Sheet onClose={() => dispatch({ type:"CLOSE_MODAL" })}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h3 style={{ margin:0, fontSize:20, fontWeight:800, color:C.text }}>Add Exercise</h3>

function ProgramExerciseList({ exercises, onChange }) {
  const [editingIdx, setEditingIdx] = useState(null);

  const deleteEx = (idx) => {
    const newExs = exercises.filter((_, k) => k !== idx).map(x => {
      if (x.supersetWithIdx === idx) return { ...x, supersetWithIdx: undefined };
      if (x.supersetWithIdx > idx) return { ...x, supersetWithIdx: x.supersetWithIdx - 1 };
      return x;
    });
    onChange(newExs);
  };

  const unpairEx = (idx) => {
    const partnerIdx = exercises[idx]?.supersetWithIdx;
    const newExs = exercises.map((x, k) => {
      if (k === idx || k === partnerIdx) return { ...x, supersetWithIdx: undefined };
      return x;
    });
    onChange(newExs);
  };

  const pairExs = (idx1, idx2) => {
    const newExs = exercises.map((x, k) => {
      if (k === idx1) return { ...x, supersetWithIdx: idx2 };
      if (k === idx2) return { ...x, supersetWithIdx: idx1 };
      return x;
    });
    onChange(newExs);
  };

  const moveEx = (fromIdx, direction) => {
    const toIdx = fromIdx + direction;
    if (toIdx < 0 || toIdx >= exercises.length) return;
    const arr = [...exercises];
    // Check if this is part of a superset — move both
    const ex = arr[fromIdx];
    if (ex.supersetWithIdx != null) {
      const partnerIdx = ex.supersetWithIdx;
      const minIdx = Math.min(fromIdx, partnerIdx);
      const maxIdx = Math.max(fromIdx, partnerIdx);
      const pair = [arr[minIdx], arr[maxIdx]];
      const rest = arr.filter((_, i) => i !== minIdx && i !== maxIdx);
      const insertAt = Math.max(0, Math.min(rest.length, minIdx + direction));
      rest.splice(insertAt, 0, ...pair);
      // Remap supersetWithIdx
      const oldIndices = rest.map(e => exercises.indexOf(e));
      const oldToNew = {};
      oldIndices.forEach((oldI, newI) => { oldToNew[oldI] = newI; });
      const remapped = rest.map(e => {
        if (e.supersetWithIdx != null) return { ...e, supersetWithIdx: oldToNew[e.supersetWithIdx] };
        return e;
      });
      onChange(remapped);
      return;
    }
    [arr[fromIdx], arr[toIdx]] = [arr[toIdx], arr[fromIdx]];
    // Remap superset indices
    const oldIndices = arr.map(e => exercises.indexOf(e));
    const oldToNew = {};
    oldIndices.forEach((oldI, newI) => { oldToNew[oldI] = newI; });
    const remapped = arr.map(e => {
      if (e.supersetWithIdx != null) return { ...e, supersetWithIdx: oldToNew[e.supersetWithIdx] };
      return e;
    });
    onChange(remapped);
  };

  const updateEx = (idx) => {
    const setsEl = document.getElementById(`pex-sets-${idx}`);
    const repsEl = document.getElementById(`pex-reps-${idx}`);
    if (setsEl || repsEl) {
      const newExs = [...exercises];
      newExs[idx] = { ...newExs[idx], targetSets: setsEl?.value || newExs[idx].targetSets, targetReps: repsEl?.value || newExs[idx].targetReps };
      onChange(newExs);
    }
    setEditingIdx(null);
  };

  const rendered = new Set();
  const moveBtn = (disabled) => ({
    background:"none", border:`1px solid ${C.border}`, borderRadius:8, width:28, height:28,
    display:"flex", alignItems:"center", justifyContent:"center", cursor: disabled?"default":"pointer",
    color:C.textDim, flexShrink:0, padding:0, opacity: disabled?0.3:1,
  });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:12 }}>
      {exercises.map((ex, j) => {
        if (rendered.has(j)) return null;
        rendered.add(j);

        const partnerIdx = ex.supersetWithIdx;
        const hasPartner = partnerIdx != null && partnerIdx >= 0 && partnerIdx < exercises.length && !rendered.has(partnerIdx);

        if (hasPartner) {
          rendered.add(partnerIdx);
          const partner = exercises[partnerIdx];
          const isFirst = Math.min(j, partnerIdx) === 0;
          const isLast = Math.max(j, partnerIdx) === exercises.length - 1;
          return (
            <div key={j} style={{ borderRadius:10, border:`1.5px solid ${C.accent}40`, padding:6, background:C.accentDim+"30" }}>
              <div style={{ display:"flex", alignItems:"center", gap:4, padding:"2px 6px 6px", color:C.accent }}>
                <div style={{ display:"flex", gap:2, marginRight:4 }}>
                  <button onClick={()=>moveEx(Math.min(j,partnerIdx),-1)} style={moveBtn(isFirst)}><ArrowUp s={11}/></button>
                  <button onClick={()=>moveEx(Math.min(j,partnerIdx),1)} style={moveBtn(isLast)}><ArrowDown s={11}/></button>
                </div>
                <LinkIco s={10}/><span style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em" }}>Superset</span>
              </div>
              {[{e:ex,i:j},{e:partner,i:partnerIdx}].map(({e,i:ii}) => (
                <div key={ii} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",background:C.bg,borderRadius:8,padding:"8px 10px",marginBottom:ii===j?4:0 }}>
                  <div><span style={{ fontSize:13,fontWeight:600,color:C.text }}>{e.name}</span><span style={{ fontSize:11,color:C.textMuted,marginLeft:8 }}>{e.muscle}{!CARDIO_GROUPS.has(e.muscle)?` ${e.targetSets}x${e.targetReps}`:""}</span></div>
                  <div style={{ display:"flex", gap:4 }}>
                    <button onClick={()=>unpairEx(j)} style={{ background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:4,display:"flex" }}><UnlinkIco s={12}/></button>
                    <button onClick={()=>deleteEx(ii)} style={{ background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:4,display:"flex" }}><X s={12}/></button>
                  </div>
                </div>
              ))}
            </div>
          );
        }

        // Single exercise
        const isFirst = j === 0;
        const isLast = j === exercises.length - 1;
        return (
          <div key={j} style={{ display:"flex", alignItems:"center", background: editingIdx===j ? C.accentDim : C.bg, borderRadius:8, padding:"6px 10px 6px 6px", gap:6, border: editingIdx===j ? `1px solid ${C.accent}` : "1px solid transparent" }}>
            <div style={{ display:"flex", flexDirection:"column", gap:2, flexShrink:0 }}>
              <button onClick={()=>moveEx(j,-1)} style={moveBtn(isFirst)}><ArrowUp s={11}/></button>
              <button onClick={()=>moveEx(j,1)} style={moveBtn(isLast)}><ArrowDown s={11}/></button>
            </div>
            <div style={{ flex:1, minWidth:0, cursor:"pointer" }} onClick={()=>setEditingIdx(editingIdx===j ? null : j)}>
              <span style={{ fontSize:13,fontWeight:600,color:C.text }}>{ex.name}</span>
              {editingIdx !== j && <span style={{ fontSize:11,color:C.textMuted,marginLeft:8 }}>{ex.muscle}{!CARDIO_GROUPS.has(ex.muscle)?` ${ex.targetSets}x${ex.targetReps}`:""}</span>}
            </div>
            {editingIdx === j && !CARDIO_GROUPS.has(ex.muscle) && (
              <div style={{ display:"flex", gap:4, alignItems:"center", flexShrink:0 }}>
                <input id={`pex-sets-${j}`} defaultValue={ex.targetSets} style={{ ...getInp(), width:36, fontSize:12, padding:"5px 6px", textAlign:"center" }} inputMode="numeric" placeholder="S"/>
                <span style={{ fontSize:11, color:C.textMuted }}>×</span>
                <input id={`pex-reps-${j}`} defaultValue={ex.targetReps} style={{ ...getInp(), width:44, fontSize:12, padding:"5px 6px", textAlign:"center" }} inputMode="numeric" placeholder="R"/>
                <button onClick={()=>updateEx(j)} style={{ background:C.accent, border:"none", borderRadius:6, padding:"5px 8px", color:"#fff", fontSize:10, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>OK</button>
              </div>
            )}
            <div style={{ display:"flex", gap:4, flexShrink:0 }}>
              {editingIdx !== j && exercises.filter((_,k)=>k!==j && _.supersetWithIdx==null && exercises[j].supersetWithIdx==null).length > 0 && (
                <select value="" onClick={e=>e.stopPropagation()} onChange={e2=>{
                  const pi = parseInt(e2.target.value); if(isNaN(pi)) return;
                  pairExs(j, pi);
                }} style={{ background:"none",border:`1px solid ${C.accent}40`,borderRadius:6,padding:"3px 6px",color:C.accent,fontSize:11,fontFamily:"inherit",cursor:"pointer",WebkitAppearance:"none",maxWidth:80 }}>
                  <option value="">SS</option>
                  {exercises.map((x,k)=>k!==j && x.supersetWithIdx==null && exercises[j].supersetWithIdx==null ? <option key={k} value={k}>{x.name}</option> : null)}
                </select>
              )}
              <button onClick={()=>deleteEx(j)} style={{ background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:4,display:"flex" }}><X s={12}/></button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

const ProgramsModal = React.memo(function ProgramsModal({ dispatch, programs, currentWeek, inline, favorites }) {

  const openDetail = (p) => {
    setSelProg(p);
    setView("detail");
    setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);

    setEditingId(p.id);
    setCpName(p.name);

    const nameEl = document.getElementById("ex-name");

    const repsEl = document.getElementById("ex-reps");

    const isC = CARDIO_GROUPS.has(exM);

    const reps = repsEl?.value || "";

    updated[cpIdx] = { ...updated[cpIdx], exercises:[...updated[cpIdx].exercises, { name, muscle:exM, targetSets:isC?"1":sets, targetReps:reps }]};

    if (nameEl) nameEl.value = "";
    if (setsEl) setsEl.value = "";
    if (repsEl) repsEl.value = "";
  };

  const saveProg = () => {
    // Read current values from uncontrolled inputs
    const nameVal = (document.getElementById("cp-name")?.value || cpName).trim();
    const notesVal = document.getElementById("cp-notes")?.value || cpNotes;
    // Read day names and notes from DOM

      ...d,
      name: document.getElementById(`dn-${i}`)?.value || d.name,
      notes: document.getElementById(`dnotes-${i}`)?.value || d.notes || "",

    if(!nameVal || finalDays.every(d=>d.exercises.length===0 && !d.isRest)) return;

      dispatch({ type:"UPDATE_PROGRAM", payload:{ id:editingId, name:nameVal, notes:notesVal, days:finalDays }});

      setSelProg(updated);
      setEditingId(null);
      setView("detail");

      dispatch({ type:"ADD_PROGRAM", payload:{ id:`c_${Date.now()}`, name:nameVal, notes:notesVal, days:finalDays }});

    setEditingId(null); setCpName(""); setCpNotes(""); setCpDays([{name:"Day 1",exercises:[]}]); setCpIdx(0);

          {/* Search */}

              <button key={cat} onClick={()=>setFilterCat(cat)} style={{
                padding:"7px 14px", borderRadius:20, fontSize:12, fontWeight:700, cursor:"pointer",

          {(() => {

            if (filterCat !== "All") list = list.filter(p => p.category === filterCat);
            if (searchProg.trim()) list = list.filter(p => p.name.toLowerCase().includes(searchProg.toLowerCase()));
            if (sortBy === "alpha") list.sort((a,b) => a.name.localeCompare(b.name));
            else if (sortBy === "days") list.sort((a,b) => a.days.length - b.days.length);
            else if (sortBy === "favorites") list.sort((a,b) => {
              const aFav = (favorites||[]).includes(a.id) ? 0 : 1;
              const bFav = (favorites||[]).includes(b.id) ? 0 : 1;
              return aFav - bFav;
            });
            return list.map(p => {
              const isFav = (favorites||[]).includes(p.id);
              return (
                <div key={p.id} style={{ display:"flex", alignItems:"center", gap:0 }}>
                  <button onClick={(e)=>{e.stopPropagation();dispatch({type:"TOGGLE_FAVORITE",payload:p.id});}} style={{

                    fontFamily:"inherit", display:"flex", justifyContent:"space-between", alignItems:"center", width:"100%", textAlign:"left",
                  }}>
                    <div>
                      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                        <span style={{ fontSize:16, fontWeight:700, color:C.text }}>{p.name}</span>
                        {p.category && <span style={{ fontSize:9, fontWeight:700, padding:"2px 6px", borderRadius:6, textTransform:"uppercase", letterSpacing:"0.04em",
                          background: p.category==="Beginner" ? "#22c55e20" : p.category==="Intermediate" ? "#eab30820" : "#ef444420",
                          color: p.category==="Beginner" ? "#22c55e" : p.category==="Intermediate" ? "#eab308" : "#ef4444",

                        {p.id.startsWith("c_") && <span style={{ fontSize:9, fontWeight:700, padding:"2px 6px", borderRadius:6, textTransform:"uppercase", letterSpacing:"0.04em", background:`${C.accent}20`, color:C.accent }}>Custom</span>}
                      </div>

      {/* CREATE / EDIT */}

        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

          <div>

                  border: cpDays[cpIdx].isRest ? `1.5px solid ${C.success}` : `1px solid ${C.border}`,
                  background: cpDays[cpIdx].isRest ? C.successDim : "transparent",

                  {cpDays[cpIdx].isRest ? <><Check s={14}/> Rest Day</> : "Mark as Rest Day"}
                </button>

                    placeholder="Day notes — set/rep details, supersets, rest times..."
                    defaultValue={cpDays[cpIdx].notes || ""}

                {!cpDays[cpIdx].isRest && (<>
                  {cpDays[cpIdx].exercises.length > 0 && (

                    />

                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    <input id="ex-name" style={getInp()} placeholder="Exercise name" defaultValue=""/>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {MUSCLE_GROUPS.map(m => (
                        <button key={m} onClick={()=>setExM(m)} style={{
                          padding:"5px 10px", borderRadius:8, fontSize:10, fontWeight:600,
                          border: exM===m ? `1.5px solid ${mColor[m]}` : `1px solid ${C.border}`,
                          background: exM===m ? `${mColor[m]}18` : "transparent", color: exM===m ? mColor[m] : C.textMuted,
                          cursor:"pointer", fontFamily:"inherit",
                        }}>{m}</button>
                      ))}
                    </div>
                    {!CARDIO_GROUPS.has(exM) ? (
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                        <input id="ex-sets" style={getInp()} placeholder="Sets" inputMode="numeric" defaultValue=""/>
                        <input id="ex-reps" style={getInp()} placeholder="Reps" inputMode="numeric" defaultValue=""/>
                      </div>
                    ) : null}
                    <button onClick={addEx} style={{ padding:"12px", borderRadius:10, border:`1px solid ${C.border}`, background:C.surface, color:C.text, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>+ Add Exercise</button>
                  </div>
                </>)}
              </div>
            )}
          </div>
          <button onClick={saveProg} style={{
            padding:"16px", borderRadius:14, border:"none",
            background: cpName.trim()&&cpDays.some(d=>d.exercises.length>0 || d.isRest) ? C.accent : C.border,
            color: cpName.trim()&&cpDays.some(d=>d.exercises.length>0 || d.isRest) ? "#fff" : C.textMuted,
            fontSize:16, fontWeight:800, cursor: cpName.trim()&&cpDays.some(d=>d.exercises.length>0 || d.isRest)?"pointer":"default", fontFamily:"inherit",
          }}>{editingId ? "Save Changes" : "Save Program"}</button>
        </div>
      </>}
    </Wrapper>
  );
});
